            if (res.ok) { documents = await res.json(); docsLoaded = true; }
        } catch {}
        renderDocuments();
    }

    function renderDocuments() {
        const list = document.getElementById('docsList');
        const badge = document.getElementById('docsCount');
        if (documents.length > 0) {
            badge.textContent = documents.length;
            badge.style.display = '';
        } else {
            badge.style.display = 'none';
        }

        // Stats
        const statsEl = document.getElementById('docsStats');
        if (documents.length > 0) {
            const totalSize = documents.reduce((s,d) => s + (d.file_size||0), 0);
            const visibleCount = documents.filter(d => d.visible_to_client !== false).length;
            const clientCount = documents.filter(d => d.uploaded_by === 'client').length;
            statsEl.innerHTML = '<div class="doc-stat"><div class="doc-stat-num">' + documents.length + '</div><div class="doc-stat-label">Файлов</div></div>'
                + '<div class="doc-stat"><div class="doc-stat-num">' + formatFileSize(totalSize) + '</div><div class="doc-stat-label">Общий размер</div></div>'
                + '<div class="doc-stat"><div class="doc-stat-num">' + visibleCount + '</div><div class="doc-stat-label">Видны клиенту</div></div>'
                + '<div class="doc-stat"><div class="doc-stat-num">' + clientCount + '</div><div class="doc-stat-label">От клиента</div></div>';
            statsEl.style.display = '';
        } else {
            statsEl.style.display = 'none';
        }

        if (!documents.length) {
            list.innerHTML = '<div class="docs-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div>Документов пока нет</div><div style="font-size:.78rem;margin-top:4px">Загрузите файлы — договоры, ТЗ, макеты</div></div>';
            return;
        }
        list.innerHTML = documents.map(doc => {
            const cls = getDocIconClass(doc.original_name);
            const ext = getDocExt(doc.original_name);
            const isClient = doc.uploaded_by === 'client';
            const uploaderLabel = isClient ? 'Клиент' : 'Админ';
            const uploaderCls = isClient ? 'client' : 'admin';
            const visible = doc.visible_to_client !== false;
            const tags = (doc.tags || '').split(',').map(t => t.trim()).filter(Boolean);
            const comment = doc.comment || '';

            let html = '<div class="doc-card" data-doc-id="'+doc.id+'">';
            html += '<div class="doc-card-header">';
            html += '<div class="doc-icon '+cls+'">'+escapeHtml(ext)+'</div>';
            html += '<div class="doc-info"><div class="doc-name" title="'+escapeHtml(doc.original_name)+'">'+escapeHtml(doc.original_name)+'</div>';
            html += '<div class="doc-meta"><span>'+formatFileSize(doc.file_size)+'</span><span>'+formatDocDate(doc.created_at)+'</span><span class="doc-meta-badge '+uploaderCls+'">'+uploaderLabel+'</span></div></div>';
            html += '<div class="doc-actions">';
            html += '<a class="doc-action-btn" href="'+escapeHtml(doc.s3_url)+'" target="_blank" title="Скачать"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></a>';
            html += '<button class="doc-action-btn delete" data-del-doc="'+doc.id+'" title="Удалить"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>';
            html += '</div></div>';

            // Tags + comment body (only if present)
            if (tags.length || comment) {
                html += '<div class="doc-card-body">';
                if (tags.length) {
                    html += '<div class="doc-tags">' + tags.map(t => '<span class="doc-tag">'+escapeHtml(t)+'</span>').join('') + '</div>';
                }
                if (comment) {
                    html += '<div class="doc-comment">'+escapeHtml(comment)+'</div>';
                }
                html += '</div>';
            }

            // Footer: visibility + edit
            html += '<div class="doc-card-footer">';
            html += '<label class="doc-vis-toggle"><input type="checkbox" data-vis-doc="'+doc.id+'"'+(visible?' checked':'')+'>Виден клиенту</label>';
            html += '<button class="doc-edit-link" data-edit-doc="'+doc.id+'">Редактировать</button>';
            html += '</div>';

            // Edit panel (hidden)
            html += '<div class="doc-edit-panel" id="docEdit'+doc.id+'">';
            html += '<div class="doc-edit-row"><label>Теги (через запятую)</label><input type="text" data-tags-input="'+doc.id+'" value="'+escapeHtml(doc.tags||'')+'" placeholder="договор, ТЗ, макет"></div>';
            html += '<div class="doc-edit-row"><label>Комментарий</label><textarea data-comment-input="'+doc.id+'" placeholder="Заметка к документу...">'+escapeHtml(comment)+'</textarea></div>';
            html += '<div class="doc-edit-actions"><button class="doc-edit-save" data-save-doc="'+doc.id+'">Сохранить</button></div>';
            html += '</div>';

            html += '</div>';
            return html;
        }).join('');
    }

    // Upload via click / drag-n-drop
    const uploadZone = document.getElementById('docsUploadZone');
    const fileInput = document.getElementById('docsFileInput');
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { if (fileInput.files.length) uploadFiles(fileInput.files); fileInput.value = ''; });
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files); });

    async function uploadFiles(files) {
        const fd = new FormData();
        for (const f of files) fd.append('files', f);
        uploadZone.classList.add('doc-uploading');
        try {
            const res = await authFetch('/api/proposal/' + TOKEN + '/documents', { method: 'POST', body: fd });
            if (res.ok) {
                const data = await res.json();
                if (data.documents) documents.unshift(...data.documents);
                renderDocuments();
                showToast('Загружено файлов: ' + (data.documents || []).length);
            } else { showToast('Ошибка загрузки', true); }
        } catch(e) { showToast('Ошибка загрузки', true); }
        finally { uploadZone.classList.remove('doc-uploading'); }
    }

    // Document actions delegation
    document.getElementById('docsList').addEventListener('click', function(e) {
        // Delete
        const delBtn = e.target.closest('[data-del-doc]');
        if (delBtn) {
            const docId = parseInt(delBtn.dataset.delDoc);
            const doc = documents.find(d => d.id === docId);
            if (doc) openDeleteDocModal(doc);
            return;
        }
        // Edit toggle
        const editBtn = e.target.closest('[data-edit-doc]');
        if (editBtn) {
            const panel = document.getElementById('docEdit' + editBtn.dataset.editDoc);
            if (panel) panel.classList.toggle('open');
            return;
        }
        // Save edits
        const saveBtn = e.target.closest('[data-save-doc]');
        if (saveBtn) {
            saveDocMeta(parseInt(saveBtn.dataset.saveDoc));
            return;
        }
    });

    // Visibility toggle
    document.getElementById('docsList').addEventListener('change', function(e) {
        const cb = e.target.closest('[data-vis-doc]');
        if (!cb) return;
        const docId = parseInt(cb.dataset.visDoc);
        updateDocField(docId, { visible_to_client: cb.checked });
    });

    async function updateDocField(docId, fields) {
        try {
            const res = await authFetch('/api/proposal/'+TOKEN+'/documents/'+docId, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(fields)
            });
            if (res.ok) {
                const data = await res.json();
                if (data.document) {
                    const idx = documents.findIndex(d => d.id === docId);
                    if (idx >= 0) documents[idx] = data.document;
                }
            }
        } catch {}
    }

    async function saveDocMeta(docId) {
        const tagsInput = document.querySelector('[data-tags-input="'+docId+'"]');
        const commentInput = document.querySelector('[data-comment-input="'+docId+'"]');
        if (!tagsInput || !commentInput) return;
        await updateDocField(docId, { tags: tagsInput.value, comment: commentInput.value });
        // Update local
        const doc = documents.find(d => d.id === docId);
        if (doc) { doc.tags = tagsInput.value; doc.comment = commentInput.value; }
        renderDocuments();
        showToast('Сохранено');
    }

    function openDeleteDocModal(doc) {
        const overlay = document.getElementById('deleteDocOverlay');
        const preview = document.getElementById('deleteDocPreview');
        const cls = getDocIconClass(doc.original_name);
        const ext = getDocExt(doc.original_name);
        preview.innerHTML = '<div class="doc-icon '+cls+'">'+escapeHtml(ext)+'</div><div class="doc-name">'+escapeHtml(doc.original_name)+'</div>';
        overlay.classList.add('open');

        function close() { overlay.classList.remove('open'); cleanup(); }
        function cleanup() {
            document.getElementById('deleteDocConfirm').removeEventListener('click', onConfirm);
            document.getElementById('deleteDocCancel').removeEventListener('click', close);
            overlay.removeEventListener('click', onBg);
        }
        function onBg(e) { if (e.target === overlay) close(); }
        async function onConfirm() {
            try {
                const res = await authFetch('/api/proposal/'+TOKEN+'/documents/'+doc.id, { method: 'DELETE' });
                if (res.ok) {
                    documents = documents.filter(d => d.id !== doc.id);
                    renderDocuments();
                    showToast('Документ удалён');
                } else { showToast('Ошибка удаления', true); }
            } catch { showToast('Ошибка удаления', true); }
            close();
        }
        document.getElementById('deleteDocConfirm').addEventListener('click', onConfirm);
        document.getElementById('deleteDocCancel').addEventListener('click', close);
        overlay.addEventListener('click', onBg);
    }

    (async () => { await Promise.all([loadClientsList(), loadSellersList(), loadProjectsList()]); loadProposal(); })();
    </script>
    <script src="/sidebar.js"></script>
</body>
</html>
