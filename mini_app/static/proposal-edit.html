<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/tokens.css?v=1772410000">
    <link rel="stylesheet" href="/css/base.css?v=1772410000">
    <link rel="stylesheet" href="/css/components/sidebar.css?v=1772410000">
    <link rel="stylesheet" href="/css/components/buttons.css?v=1772410000">
    <link rel="stylesheet" href="/css/components/cards.css?v=1772410000">
    <link rel="stylesheet" href="/css/components/inputs.css?v=1772410000">
    <link rel="stylesheet" href="/css/components/modals.css?v=1772410000">
    <link rel="stylesheet" href="/css/components/badges.css?v=1772410000">
    <link rel="stylesheet" href="/css/components/toast.css?v=1772410000">
    <link rel="stylesheet" href="/css/layouts/page-shell.css?v=1772410000">
    <link rel="stylesheet" href="/css/layouts/responsive.css?v=1772410000">
    <title>Редактирование предложения</title>
    <style>
        .top-breadcrumb { padding:10px 24px; border-bottom:1px solid var(--border); background:var(--bg); display:flex; align-items:center; gap:6px; font-size:.82rem; color:var(--text-dim); }
        .top-breadcrumb a { color:var(--text-dim); text-decoration:none; transition:color var(--transition); }
        .top-breadcrumb a:hover { color:var(--accent); }
        .breadcrumb-sep { opacity:.4; }
        .breadcrumb-current { color:var(--text); font-weight:600; }
        .page-container { max-width:1100px; margin:0 auto; padding:24px; }

        .editor-header-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:20px; }
        .editor-header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
        .btn-regenerate { display:inline-flex; align-items:center; gap:7px; padding:8px 16px; border-radius:var(--radius-btn); border:1px solid var(--accent); background:rgba(108,92,231,.08); color:var(--accent); font-size:.82rem; font-weight:600; cursor:pointer; font-family:inherit; transition:background .15s; white-space:nowrap; }
        .btn-regenerate:hover { background:rgba(108,92,231,.16); }
        .btn-regenerate:disabled { opacity:.5; cursor:not-allowed; }
        .btn-regenerate svg { flex-shrink:0; }
        .editor-header-title { font-size:.95rem; font-weight:700; color:var(--text); }

        .field-grid { display:grid; gap:12px; }
        .field-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .field-grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
        .field-group { min-width:0; }
        .field-group label { display:block; font-size:.68rem; color:var(--text-dim); margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
        .field-input { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:.85rem; padding:8px 10px; outline:none; transition:border-color var(--transition); font-family:inherit; box-sizing:border-box; }
        .field-input:focus { border-color:var(--accent); }
        select.field-input { cursor:pointer; }
        .field-with-actions { display:flex; align-items:flex-end; gap:6px; }
        .field-with-actions .field-group { flex:1; min-width:0; }
        .field-action-btn { display:flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface-2); color:var(--text-dim); cursor:pointer; transition:all .15s; flex-shrink:0; text-decoration:none; }
        .field-action-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(108,92,231,.08); }
        .field-action-btn svg { flex-shrink:0; }
        .field-action-btn[style*="display:none"] + .field-action-btn { margin-left:0; }

        /* ── Searchable dropdown ── */
        .search-select { position:relative; }
        .search-select-trigger { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:.88rem; padding:9px 32px 9px 12px; outline:none; cursor:pointer; font-family:inherit; box-sizing:border-box; transition:border-color var(--transition); text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
        .search-select-trigger:focus, .search-select.open .search-select-trigger { border-color:var(--accent); }
        .search-select-trigger::after { content:''; position:absolute; right:12px; top:50%; transform:translateY(-50%); border:4px solid transparent; border-top:5px solid var(--text-dim); }
        .search-select-trigger.placeholder { color:var(--text-dim); }
        .search-select-dropdown { display:none; position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); z-index:200; max-height:260px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.4); flex-direction:column; }
        .search-select.open .search-select-dropdown { display:flex; }
        .search-select-search { width:100%; background:var(--surface-2); border:none; border-bottom:1px solid var(--border); color:var(--text); font-size:.85rem; padding:10px 12px; outline:none; font-family:inherit; box-sizing:border-box; }
        .search-select-search::placeholder { color:var(--text-dim); }
        .search-select-options { overflow-y:auto; max-height:210px; }
        .search-select-option { padding:8px 12px; cursor:pointer; font-size:.85rem; color:var(--text); transition:background .1s; }
        .search-select-option:hover { background:var(--surface-2); }
        .search-select-option.active { background:rgba(108,92,231,.15); color:var(--accent); }
        .search-select-option.empty { color:var(--text-dim); cursor:default; font-style:italic; }
        .search-select-clear { position:absolute; right:28px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-dim); cursor:pointer; padding:2px; display:flex; align-items:center; z-index:1; }
        .search-select-clear:hover { color:var(--red); }

        /* ── Multi-select chips ── */
        .multi-select { position:relative; }
        .multi-select-box { display:flex; flex-wrap:wrap; gap:5px; min-height:36px; padding:5px 8px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; transition:border-color var(--transition); align-items:center; }
        .multi-select-box:hover, .multi-select.open .multi-select-box { border-color:var(--accent); }
        .multi-select-chip { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; background:rgba(108,92,231,.12); color:var(--accent); border-radius:6px; font-size:.78rem; font-weight:600; white-space:nowrap; max-width:200px; }
        .multi-select-chip span { overflow:hidden; text-overflow:ellipsis; }
        .multi-select-chip-x { background:none; border:none; color:var(--accent); cursor:pointer; padding:0; font-size:14px; line-height:1; opacity:.7; transition:opacity .1s; display:flex; }
        .multi-select-chip-x:hover { opacity:1; color:var(--red); }
        .multi-select-placeholder { color:var(--text-dim); font-size:.85rem; padding:2px 4px; }
        .multi-select-dropdown { display:none; position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); z-index:200; max-height:260px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,.4); flex-direction:column; }
        .multi-select.open .multi-select-dropdown { display:flex; }



        /* ── Section divider ── */
        .section-divider { display:flex; align-items:center; gap:12px; margin:24px 0 12px; }
        .section-divider-title { font-size:.92rem; font-weight:700; white-space:nowrap; }
        .section-divider-line { flex:1; height:1px; background:var(--border); }
        .section-divider-badge { font-size:.75rem; font-weight:600; padding:2px 8px; border-radius:10px; white-space:nowrap; }
        .section-divider-badge.design { background:rgba(253,121,168,.12); color:var(--pink); }
        .section-divider-badge.dev { background:rgba(108,92,231,.1); color:var(--accent); }
        
        .stage-empty-hint { color:var(--text-dim); font-size:.82rem; padding:12px 0 4px; font-style:italic; }

        /* ── Module card ── */
        .module-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; }
        .module-header { display:flex; align-items:center; gap:10px; padding:11px 14px; background:var(--surface-2); border-bottom:1px solid var(--border); cursor:pointer; }
        .module-header:hover { background:var(--surface-3); }
        .module-collapse-icon { transition:transform var(--transition); color:var(--text-dim); flex-shrink:0; }
        .module-card.collapsed .module-collapse-icon { transform:rotate(-90deg); }
        .module-card.collapsed .module-body { display:none; }
        .module-name-input { flex:1; background:transparent; border:1px solid transparent; border-radius:6px; color:var(--text); font-size:.88rem; font-weight:600; padding:3px 7px; outline:none; transition:border-color var(--transition); font-family:inherit; min-width:0; }
        .module-name-input:focus { border-color:var(--accent); background:var(--surface); }
        .module-hours-badge { background:rgba(108,92,231,.1); color:var(--accent); font-size:.75rem; font-weight:700; padding:3px 9px; border-radius:6px; white-space:nowrap; flex-shrink:0; }
        .module-delete-btn { background:none; border:none; color:var(--text-dim); cursor:pointer; padding:6px; border-radius:6px; transition:var(--transition); display:inline-flex; align-items:center; flex-shrink:0; user-select:none; }
        .module-delete-btn:hover { color:var(--red); background:rgba(225,115,85,.12); }
        .module-delete-btn svg, .add-row-btn svg, .add-work-btn svg { pointer-events:none; }
        .module-body { padding:12px 14px; }

        .work-item { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
        .work-item-name { flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:.82rem; padding:7px 10px; outline:none; transition:border-color var(--transition); font-family:inherit; min-width:0; }
        .work-item-name:focus { border-color:var(--accent); }
        .work-item-hours { width:60px; background:var(--surface-2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:.82rem; padding:7px 8px; text-align:center; outline:none; transition:border-color var(--transition); font-family:inherit; flex-shrink:0; }
        .work-item-hours:focus { border-color:var(--accent); }
        .work-item-unit { font-size:.72rem; color:var(--text-dim); flex-shrink:0; }
        .work-item-delete { background:none; border:none; color:var(--text-dim); cursor:pointer; padding:6px; border-radius:4px; transition:var(--transition); display:inline-flex; align-items:center; flex-shrink:0; user-select:none; font-size:16px; font-weight:700; line-height:1; }
        .work-item-delete:hover { color:var(--red); background:rgba(225,115,85,.08); }
        .add-row-btn { background:none; border:1px dashed var(--border); border-radius:6px; color:var(--text-dim); cursor:pointer; padding:5px 10px; font-size:.78rem; font-family:inherit; transition:var(--transition); display:inline-flex; align-items:center; gap:5px; }
        .add-row-btn:hover { border-color:var(--accent); color:var(--accent); }

        /* ── Overhead ── */
        .overhead-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:14px; }
        .overhead-label { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
        .overhead-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .overhead-icon.pm { background:rgba(108,92,231,.12); color:var(--accent); }
        .overhead-icon.qa { background:rgba(0,206,201,.12); color:var(--green); }
        .overhead-icon.mkt { background:rgba(253,203,110,.12); color:var(--orange); }
        .overhead-icon.seller { background:rgba(253,121,168,.12); color:#fd79a8; }
        .overhead-icon.custom { background:rgba(139,143,168,.1); color:var(--text-dim); }
        .overhead-icon.discount { background:rgba(0,206,201,.12); color:var(--green); }
        .overhead-card.discount { border-color:rgba(0,206,201,.25); background:rgba(0,206,201,.04); }
        .overhead-card.discount .overhead-hours, .overhead-card.discount .overhead-cost { color:var(--green); }
        .overhead-name { font-size:.88rem; font-weight:600; color:var(--text); }
        .overhead-name-input { background:transparent; border:1px solid transparent; border-radius:5px; color:var(--text); font-size:.85rem; font-weight:600; padding:2px 6px; outline:none; font-family:inherit; min-width:120px; max-width:200px; }
        .overhead-name-input:focus { border-color:var(--accent); background:var(--surface); }
        .overhead-desc { font-size:.72rem; color:var(--text-dim); margin-top:1px; }
        .overhead-pct-wrap { display:flex; align-items:center; gap:6px; flex-shrink:0; }
        .overhead-pct-input { width:52px; background:var(--surface-2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:.85rem; padding:6px 6px; text-align:center; outline:none; font-family:inherit; }
        .overhead-pct-input:focus { border-color:var(--accent); }
        .overhead-pct-symbol { font-size:.78rem; color:var(--text-dim); }
        .overhead-hours { font-size:.85rem; color:var(--text); font-weight:600; min-width:60px; text-align:right; flex-shrink:0; }
        .overhead-cost { font-size:.85rem; color:var(--text-dim); min-width:80px; text-align:right; flex-shrink:0; }
        .overhead-delete { background:none; border:none; color:var(--text-dim); cursor:pointer; padding:4px; border-radius:4px; display:inline-flex; align-items:center; transition:var(--transition); flex-shrink:0; }
        .overhead-delete:hover { color:var(--red); background:rgba(225,115,85,.1); }
        .overhead-add-btn { background:none; border:1px dashed var(--border); border-radius:var(--radius); color:var(--text-dim); cursor:pointer; padding:10px 16px; font-size:.82rem; font-family:inherit; transition:var(--transition); display:flex; align-items:center; gap:8px; margin-top:6px; }
        .overhead-add-btn:hover { border-color:var(--accent); color:var(--accent); }

        /* ── Discount toggle ── */
        .discount-toggle-row { display:flex; align-items:center; gap:14px; margin-top:14px; padding:12px 16px; background:rgba(16,185,129,.06); border:1px solid rgba(16,185,129,.18); border-radius:var(--radius-sm); transition:all .25s; }
        .discount-toggle-row.inactive { background:var(--surface-2); border-color:var(--border); }
        .toggle-switch { position:relative; width:44px; height:24px; flex-shrink:0; cursor:pointer; }
        .toggle-switch input { opacity:0; width:0; height:0; position:absolute; }
        .toggle-slider { position:absolute; cursor:pointer; inset:0; background:var(--surface-3); border:1px solid var(--border); border-radius:24px; transition:all .25s; }
        .toggle-slider::before { content:''; position:absolute; width:18px; height:18px; left:2px; bottom:2px; background:var(--text-dim); border-radius:50%; transition:all .25s; }
        .toggle-switch input:checked + .toggle-slider { background:rgba(16,185,129,.2); border-color:rgba(16,185,129,.4); }
        .toggle-switch input:checked + .toggle-slider::before { transform:translateX(20px); background:#059669; }
        .discount-label { font-size:.88rem; font-weight:600; color:var(--text); display:flex; align-items:center; gap:8px; flex:1; }
        .discount-label .discount-hint { font-size:.75rem; font-weight:400; color:var(--text-dim); }
        .discount-pct-wrap { display:flex; align-items:center; gap:6px; flex-shrink:0; }
        .discount-pct-input { width:60px; background:var(--surface-2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:.85rem; padding:6px 8px; text-align:center; outline:none; font-family:inherit; transition:border-color .15s; }
        .discount-pct-input:focus { border-color:var(--accent); }
        .discount-pct-input:disabled { opacity:.4; cursor:not-allowed; }

        /* ── Totals ── */
        .totals-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-top:14px; }
        .totals-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; }
        .totals-row + .totals-row { border-top:1px solid var(--border); }
        .totals-label { font-size:.85rem; color:var(--text-dim); font-weight:500; }
        .totals-value { font-size:1rem; font-weight:700; color:var(--text); }
        .totals-value.accent { color:var(--accent); }
        .totals-value.green { color:var(--green); font-size:1.15rem; }
        .totals-row.grand { padding:12px 0 4px; }
        .totals-row.grand .totals-label { font-size:.92rem; font-weight:700; color:var(--text); }

        /* ── Payment Phases ── */
        .pay-phases { margin-top:14px; }
        .pay-phase { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:10px; display:flex; align-items:flex-start; gap:14px; }
        .pay-phase-num { width:28px; height:28px; border-radius:50%; background:rgba(120,124,245,.1); color:var(--accent); font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
        .pay-phase-num.paid { background:rgba(16,185,129,.15); color:#059669; }
        .pay-phase-body { flex:1; min-width:0; }
        .pay-phase-top { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
        .pay-phase-name { font-size:.88rem; font-weight:600; color:var(--text); flex:1; }
        .pay-phase-cost { font-size:.92rem; font-weight:700; color:var(--text); white-space:nowrap; }
        .pay-phase-delivs { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
        .pay-phase-deliv { font-size:.72rem; padding:3px 10px; background:var(--surface-2); border:1px solid var(--border); border-radius:100px; color:var(--text-dim); }
        .pay-phase-status { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:100px; font-size:.72rem; font-weight:600; cursor:pointer; transition:var(--transition); flex-shrink:0; }
        .pay-phase-status.pending { background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.25); color:#f59e0b; }
        .pay-phase-status.pending:hover { background:rgba(245,158,11,.18); }
        .pay-phase-status.paid { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.25); color:#059669; }
        .pay-phase-status.paid:hover { background:rgba(16,185,129,.18); }
        .pay-phase-date { font-size:.7rem; color:var(--text-dim); margin-top:4px; }

        .save-bar { position:sticky; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:12px 24px; display:flex; justify-content:flex-end; gap:12px; z-index:50; }

        .regen-modal { max-width:560px; }
        .regen-field { margin-bottom:14px; }
        .regen-field label { display:block; font-size:.75rem; color:var(--text-dim); margin-bottom:5px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
        .regen-field textarea { width:100%; min-height:110px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:.85rem; padding:10px 12px; outline:none; font-family:inherit; resize:vertical; transition:border-color var(--transition); box-sizing:border-box; }
        .regen-field textarea:focus { border-color:var(--accent); }
        .regen-field input, .regen-field select { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:.85rem; padding:9px 12px; outline:none; font-family:inherit; transition:border-color var(--transition); box-sizing:border-box; }
        .regen-field input:focus, .regen-field select:focus { border-color:var(--accent); }
        .regen-row { display:flex; gap:10px; }
        .regen-row .regen-field { flex:1; min-width:0; }
        .regen-spinner { display:none; align-items:center; gap:10px; padding:20px; justify-content:center; color:var(--text-dim); font-size:.88rem; }
        .regen-spinner.active { display:flex; }
        .regen-spinner svg { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ── Page Tabs ── */
        .page-tabs { display:flex; gap:0; margin:0; padding:0 24px; background:var(--surface); border-bottom:1px solid var(--border); }
        .page-tab { padding:12px 20px; font-size:.85rem; font-weight:600; color:var(--text-dim); cursor:pointer; border:none; background:none; font-family:inherit; position:relative; transition:color .2s; display:flex; align-items:center; gap:7px; }
        .page-tab:hover { color:var(--text); }
        .page-tab.active { color:var(--accent); }
        .page-tab.active::after { content:''; position:absolute; bottom:0; left:12px; right:12px; height:2px; background:var(--accent); border-radius:2px 2px 0 0; }
        .page-tab svg { flex-shrink:0; }
        .page-tab .tab-badge { font-size:.68rem; padding:1px 6px; border-radius:10px; background:rgba(108,92,231,.12); color:var(--accent); font-weight:700; min-width:18px; text-align:center; }

        /* ── Documents ── */
        .docs-container { max-width:1100px; margin:0 auto; padding:24px; }
        .docs-upload-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:40px 24px; text-align:center; cursor:pointer; transition:all .2s; background:var(--surface); }
        .docs-upload-zone:hover, .docs-upload-zone.dragover { border-color:var(--accent); background:rgba(108,92,231,.04); }
        .docs-upload-zone svg { color:var(--text-dim); margin-bottom:8px; }
        .docs-upload-zone-title { font-size:.88rem; font-weight:600; color:var(--text); margin-bottom:4px; }
        .docs-upload-zone-hint { font-size:.75rem; color:var(--text-dim); }
        .docs-list { margin-top:20px; display:flex; flex-direction:column; gap:12px; }
        .doc-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:border-color .2s,box-shadow .2s; }
        .doc-card:hover { border-color:rgba(108,92,231,.3); box-shadow:0 2px 12px rgba(108,92,231,.06); }
        .doc-card-header { display:flex; align-items:center; gap:12px; padding:16px 18px; }
        .doc-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:.65rem; font-weight:700; text-transform:uppercase; }
        .doc-icon.pdf { background:rgba(225,115,85,.12); color:var(--red); }
        .doc-icon.img { background:rgba(108,92,231,.1); color:var(--accent); }
        .doc-icon.doc { background:rgba(0,206,201,.1); color:var(--green); }
        .doc-icon.other { background:rgba(139,143,168,.1); color:var(--text-dim); }
        .doc-info { flex:1; min-width:0; }
        .doc-name { font-size:.88rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .doc-meta { font-size:.72rem; color:var(--text-dim); margin-top:3px; display:flex; gap:8px; align-items:center; }
        .doc-meta-badge { padding:1px 6px; border-radius:4px; font-size:.65rem; font-weight:600; }
        .doc-meta-badge.admin { background:rgba(108,92,231,.1); color:var(--accent); }
        .doc-meta-badge.client { background:rgba(245,158,11,.1); color:#f59e0b; }
        .doc-actions { display:flex; gap:6px; flex-shrink:0; }
        .doc-action-btn { display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:6px; border:1px solid var(--border); background:var(--surface-2); color:var(--text-dim); cursor:pointer; transition:all .15s; text-decoration:none; }
        .doc-action-btn:hover { border-color:var(--accent); color:var(--accent); }
        .doc-action-btn.delete:hover { border-color:var(--red); color:var(--red); background:rgba(225,115,85,.08); }
        .doc-card-body { padding:0 18px 14px; }
        .doc-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
        .doc-tag { padding:3px 10px; border-radius:100px; font-size:.7rem; font-weight:600; background:var(--surface-2); color:var(--text-dim); border:1px solid var(--border); }
        .doc-comment { font-size:.8rem; color:var(--text-dim); line-height:1.5; padding:8px 12px; background:var(--surface-2); border-radius:var(--radius-sm); border:1px solid var(--border); }
        .doc-card-footer { display:flex; align-items:center; gap:10px; padding:10px 18px; border-top:1px solid var(--border); background:var(--surface-2); }
        .doc-vis-toggle { display:flex; align-items:center; gap:6px; font-size:.75rem; color:var(--text-dim); cursor:pointer; user-select:none; }
        .doc-vis-toggle input { accent-color:var(--accent); width:14px; height:14px; cursor:pointer; }
        .doc-edit-link { font-size:.75rem; color:var(--accent); cursor:pointer; border:none; background:none; font-family:inherit; font-weight:600; padding:0; margin-left:auto; }
        .doc-edit-link:hover { text-decoration:underline; }
        .docs-empty { text-align:center; padding:48px 24px; color:var(--text-dim); font-size:.88rem; }
        .docs-empty svg { color:var(--text-dim); margin-bottom:12px; opacity:.5; }
        .doc-uploading { opacity:.5; pointer-events:none; }
        .doc-edit-panel { padding:12px 18px 16px; border-top:1px solid var(--border); background:rgba(108,92,231,.02); display:none; }
        .doc-edit-panel.open { display:block; }
        .doc-edit-row { margin-bottom:10px; }
        .doc-edit-row label { display:block; font-size:.72rem; font-weight:600; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:.3px; }
        .doc-edit-row input, .doc-edit-row textarea { width:100%; border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 10px; font-size:.82rem; font-family:inherit; background:var(--surface); color:var(--text); resize:vertical; box-sizing:border-box; }
        .doc-edit-row textarea { min-height:60px; }
        .doc-edit-row input:focus, .doc-edit-row textarea:focus { outline:none; border-color:var(--accent); }
        .doc-edit-actions { display:flex; gap:8px; justify-content:flex-end; }
        .doc-edit-save { padding:6px 16px; border-radius:6px; border:none; background:var(--accent); color:#fff; font-size:.78rem; font-weight:600; cursor:pointer; font-family:inherit; }
        .doc-edit-save:hover { opacity:.9; }
        .doc-stats { display:flex; gap:16px; margin-bottom:16px; }
        .doc-stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 16px; flex:1; text-align:center; }
        .doc-stat-num { font-size:1.3rem; font-weight:700; color:var(--text); }
        .doc-stat-label { font-size:.7rem; color:var(--text-dim); margin-top:2px; font-weight:500; }

        /* ── Delete Confirm Popup ── */
        .confirm-popup { max-width:380px; }
        .confirm-popup p { font-size:.88rem; color:var(--text-dim); margin-bottom:16px; line-height:1.5; }
        .confirm-popup .doc-preview { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--surface-2); border-radius:8px; margin-bottom:16px; }
        .confirm-popup .doc-preview .doc-name { font-size:.82rem; }
        .btn-danger { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius-btn); border:none; background:var(--red); color:#fff; font-size:.82rem; font-weight:600; cursor:pointer; font-family:inherit; transition:opacity .15s; }
        .btn-danger:hover { opacity:.85; }

        @media (max-width:768px) {
            .page-container { padding:14px; }
            .field-grid-3, .field-grid-4 { grid-template-columns:1fr; }
            .overhead-card { flex-wrap:wrap; gap:8px; }
            .overhead-hours, .overhead-cost { text-align:left; }
            .regen-row { flex-direction:column; }
            .editor-header-top { flex-direction:column; align-items:flex-start; gap:10px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="main-content">
        <div class="mobile-header">

            <span class="mobile-header-title">Редактирование</span>
        </div>

        </div>
        <div class="page-tabs" id="pageTabs">
            <button class="page-tab active" data-tab="calc"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>Расчёт</button>
            <button class="page-tab" data-tab="docs"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>Документы<span class="tab-badge" id="docsCount" style="display:none">0</span></button>
        </div>
        <div id="editorContent">
            <div class="page-container">
                <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px">
                    <div class="field-grid field-grid-2" style="margin-bottom:14px"><div class="field-group"><div class="sk" style="height:10px;width:100px;margin-bottom:6px"></div><div class="sk" style="height:38px;border-radius:8px"></div></div><div class="field-group"><div class="sk" style="height:10px;width:50px;margin-bottom:6px"></div><div class="sk" style="height:38px;border-radius:8px"></div></div></div>
                </div>
                <div class="module-card"><div style="padding:12px 14px;background:var(--surface-2)"><div class="sk" style="height:14px;width:40%;border-radius:6px"></div></div><div style="padding:12px 14px"><div class="sk" style="height:32px;margin-bottom:5px;border-radius:6px"></div><div class="sk" style="height:32px;border-radius:6px"></div></div></div>
            </div>
        </div>
        <div id="docsContent" style="display:none">
            <div class="page-container">
                <div class="doc-stats" id="docsStats" style="display:none"></div>
                <div class="docs-upload-zone" id="docsUploadZone">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <div class="docs-upload-zone-title">Перетащите файлы сюда или нажмите для выбора</div>
                    <div class="docs-upload-zone-hint">PDF, DOC, DOCX, XLS, XLSX, PNG, JPG — до 50 МБ</div>
                    <input type="file" id="docsFileInput" multiple style="display:none" accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.gif,.zip,.txt">
                </div>
                <div class="docs-list" id="docsList"></div>
            </div>
        </div>
        <div class="save-bar" id="saveBar" style="display:none">
            <button class="btn-secondary" onclick="window.location.href='/proposals'">Отмена</button>
            <button class="btn-primary" id="saveBtn">Сохранить изменения</button>
        </div>
    </div>
    <div class="modal-overlay" id="regenOverlay">
        <div class="modal regen-modal">
            <h3>Перегенерировать КП</h3>
            <div id="regenForm">
                <div class="regen-field"><label>Описание проекта / ТЗ</label><textarea id="regenDescription" placeholder="Опишите проект, его цели и функциональность..."></textarea></div>
                <div class="regen-row"><div class="regen-field"><label>Тип</label><select id="regenType"><option value="mvp">MVP</option><option value="full">Full</option></select></div><div class="regen-field"><label>Дизайн</label><select id="regenDesign"><option value="full_design">Полный дизайн</option><option value="wireframes">Только вайрфреймы</option><option value="no_design">Без дизайна</option></select></div></div>
                <div class="regen-row"><div class="regen-field"><label>Ставка / час</label><input type="number" id="regenRate" step="0.01" placeholder="50"></div><div class="regen-field"><label>Валюта</label><select id="regenCurrency"><option value="$">$ USD</option><option value="₽">₽ RUB</option><option value="€">€ EUR</option></select></div><div class="regen-field"><label>Бюджет (опц.)</label><input type="number" id="regenBudget" placeholder="—"></div></div>
                <div class="modal-actions"><button class="btn-secondary" id="regenCancel">Отмена</button><button class="btn-primary" id="regenSubmit">Сгенерировать</button></div>
            </div>
            <div class="regen-spinner" id="regenSpinner"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-6.22-8.56"/></svg>Генерация сметы...</div>
        </div>
    </div>
    <div class="modal-overlay" id="paymentOverlay">
        <div class="modal" style="max-width:420px">
            <h3 id="paymentTitle">Подтверждение оплаты</h3>
            <p id="paymentDesc" style="font-size:.88rem;color:var(--text-dim);margin-bottom:16px"></p>
            <div class="regen-field"><label>Дата оплаты</label><input type="date" id="paymentDate"></div>
            <div class="regen-field"><label>Комментарий (необязательно)</label><input type="text" id="paymentComment" placeholder="Номер платежа, способ оплаты..."></div>
            <div class="modal-actions">
                <button class="btn-secondary" id="paymentCancel">Отмена</button>
                <button class="btn-secondary" id="paymentUnpay" style="display:none;color:var(--red)">Снять оплату</button>
                <button class="btn-primary" id="paymentConfirm">Оплачено</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="overheadOverlay">
        <div class="modal" style="max-width:400px">
            <h3>Новый блок расходов</h3>
            <div class="regen-field"><label>Название</label><input type="text" id="overheadName" placeholder="Например: Скидка за предоплату"></div>
            <div class="regen-field"><label>Процент (отрицательный = скидка)</label><input type="number" id="overheadPct" placeholder="-10" step="1"></div>
            <div class="modal-actions"><button class="btn-secondary" id="overheadCancel">Отмена</button><button class="btn-primary" id="overheadOk">Добавить</button></div>
        </div>
    </div>
    <div class="modal-overlay" id="deleteDocOverlay">
        <div class="modal confirm-popup">
            <h3>Удалить документ?</h3>
            <div class="doc-preview" id="deleteDocPreview"></div>
            <p>Документ будет удалён без возможности восстановления.</p>
            <div class="modal-actions">
                <button class="btn-secondary" id="deleteDocCancel">Отмена</button>
                <button class="btn-danger" id="deleteDocConfirm"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>Удалить</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
    const TOKEN = window.location.pathname.split('/')[2];
    let proposalData = null;
    let allClients = [];
    let allSellers = [];
    let allProjects = [];
    let selectedClientData = null;
    const DEFAULT_OVERHEAD = { pm_percent: 15, qa_percent: 10, marketing_percent: 5 };
    const STAGES = [
        { key: 'design', title: 'UX/UI Дизайн', css: 'design', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>' },
        { key: 'dev', title: 'Разработка', css: 'dev', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>' },
    ];
    const DESIGN_MODULE_TEMPLATES = {
        full_design: { name: 'UX/UI Дизайн', stage: 'design', sub_items: [
            { name: 'Анализ и исследование', hours: 8 },
            { name: 'Вайрфреймы ключевых экранов', hours: 12 },
            { name: 'UI-дизайн и компоненты', hours: 16 },
            { name: 'Дизайн-система и гайдлайны', hours: 8 },
            { name: 'Согласование и правки', hours: 6 },
        ]},
        wireframes: { name: 'Проектирование интерфейсов', stage: 'design', sub_items: [
            { name: 'Структура экранов и навигация', hours: 6 },
            { name: 'Вайрфреймы ключевых страниц', hours: 10 },
            { name: 'Согласование и правки', hours: 4 },
        ]},
    };

    function escapeHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function showToast(msg, isError) { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show' + (isError ? ' error' : ''); setTimeout(() => t.className = 'toast', 2500); }
    function normalizeHours(val) {
        if (typeof val === 'number') return val;
        if (val && typeof val === 'object' && ('min' in val || 'max' in val)) return Math.round(((val.min||0)+(val.max||0))/2);
        return parseInt(val) || 0;
    }

    function guessStage(mod) {
        const n = (mod.name || '').toLowerCase();
        if (/дизайн|ux|ui|wireframe|вайрфрейм|макет|интерфейс/.test(n)) return 'design';
        return 'dev';
    }

    function normalizeEstimation(est) {
        if (!est) est = { modules: [] };
        if (!est.modules) est.modules = [];
        est.modules.forEach(mod => {
            (mod.sub_items || []).forEach(si => { if (si && typeof si.hours !== 'number') si.hours = normalizeHours(si.hours); });
            mod.total = (mod.sub_items || []).reduce((s, si) => s + (si.hours || 0), 0);
            if (!mod.stage) mod.stage = guessStage(mod);
            if (mod.stage === 'testing') mod.stage = 'dev';
        });
        if (!est.overhead || !est.overhead.pm_percent) est.overhead = { ...DEFAULT_OVERHEAD };
        if (!est.overhead.custom_items) est.overhead.custom_items = [];
        return est;
    }

    async function authFetch(url, opts) { const res = await fetch(url, opts); if (res.status === 401) { window.location.href = '/login'; throw new Error('unauthorized'); } return res; }
    async function loadProposal() {
        try {
            const res = await authFetch('/api/proposal/' + TOKEN);
            if (!res.ok) throw new Error('not found');
            proposalData = await res.json();
            proposalData.estimation = normalizeEstimation(proposalData.estimation || {});
            renderEditor();
        } catch(e) { document.getElementById('editorContent').innerHTML = '<div style="padding:40px;text-align:center;color:var(--red)">Не удалось загрузить предложение</div>'; }
    }
    async function loadClientsList() { try { const r = await authFetch('/api/clients'); if (r.ok) allClients = await r.json(); } catch {} }
    async function loadSelectedClient(uuid) { if (!uuid) { selectedClientData = null; return; } try { const r = await authFetch('/api/client/' + uuid); if (r.ok) selectedClientData = await r.json(); } catch {} }
    async function loadSellersList() { try { const r = await authFetch('/api/sellers'); if (r.ok) allSellers = await r.json(); } catch {} }
    async function loadProjectsList() { try { const r = await authFetch('/api/projects'); if (r.ok) allProjects = await r.json(); } catch {} }

    function createSearchSelect(containerId, items, selectedId, placeholder, onSelect) {
        const container = document.getElementById(containerId); if (!container) return;
        container.innerHTML = ''; container.classList.add('search-select');
        const trigger = document.createElement('div'); trigger.className = 'search-select-trigger'; trigger.tabIndex = 0;
        const clearBtn = document.createElement('button'); clearBtn.className = 'search-select-clear';
        clearBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
        clearBtn.style.display = selectedId ? '' : 'none';
        const dropdown = document.createElement('div'); dropdown.className = 'search-select-dropdown';
        const searchInput = document.createElement('input'); searchInput.className = 'search-select-search'; searchInput.placeholder = 'Поиск...';
        const optionsList = document.createElement('div'); optionsList.className = 'search-select-options';
        dropdown.appendChild(searchInput); dropdown.appendChild(optionsList);
        container.appendChild(trigger); container.appendChild(clearBtn); container.appendChild(dropdown);
        function setVal() { const sel = items.find(i => i.id === selectedId); if (sel) { trigger.textContent = sel.label; trigger.classList.remove('placeholder'); clearBtn.style.display = ''; } else { trigger.textContent = placeholder; trigger.classList.add('placeholder'); clearBtn.style.display = 'none'; } }
        function renderOpts(f) { const q = (f||'').toLowerCase(); const fl = items.filter(i => !q || i.label.toLowerCase().includes(q)); optionsList.innerHTML = '';
            if (!fl.length) { const e = document.createElement('div'); e.className = 'search-select-option empty'; e.textContent = 'Ничего не найдено'; optionsList.appendChild(e); return; }
            fl.forEach(item => { const o = document.createElement('div'); o.className = 'search-select-option' + (item.id === selectedId ? ' active' : ''); o.textContent = item.label;
                o.addEventListener('click', e => { e.stopPropagation(); selectedId = item.id; setVal(); container.classList.remove('open'); onSelect(item); }); optionsList.appendChild(o); }); }
        trigger.addEventListener('click', e => { e.stopPropagation(); const isOpen = container.classList.contains('open'); document.querySelectorAll('.search-select.open').forEach(el => el.classList.remove('open')); if (!isOpen) { container.classList.add('open'); searchInput.value = ''; renderOpts(''); setTimeout(() => searchInput.focus(), 10); } });
        clearBtn.addEventListener('click', e => { e.stopPropagation(); selectedId = null; setVal(); onSelect(null); });
        searchInput.addEventListener('input', () => renderOpts(searchInput.value)); searchInput.addEventListener('click', e => e.stopPropagation());
        document.addEventListener('click', () => container.classList.remove('open'));
        setVal(); renderOpts('');
    }

    let selectedClientIds = [];
    function createClientMultiSelect(containerId, items, selectedIds) {
        selectedClientIds = [...(selectedIds || [])];
        const container = document.getElementById(containerId); if (!container) return;
        container.innerHTML = ''; container.classList.add('multi-select');
        const box = document.createElement('div'); box.className = 'multi-select-box';
        const dropdown = document.createElement('div'); dropdown.className = 'multi-select-dropdown';
        const searchInput = document.createElement('input'); searchInput.className = 'search-select-search'; searchInput.placeholder = 'Поиск клиента...';
        const optionsList = document.createElement('div'); optionsList.className = 'search-select-options';
        dropdown.appendChild(searchInput); dropdown.appendChild(optionsList);
        container.appendChild(box); container.appendChild(dropdown);

        function renderBox() {
            box.innerHTML = '';
            if (!selectedClientIds.length) {
                const ph = document.createElement('span'); ph.className = 'multi-select-placeholder'; ph.textContent = '— Выберите клиентов —';
                box.appendChild(ph);
            } else {
                selectedClientIds.forEach(cid => {
                    const item = items.find(i => i.id === cid);
                    if (!item) return;
                    const chip = document.createElement('span'); chip.className = 'multi-select-chip';
                    const label = document.createElement('span'); label.textContent = item.label; chip.appendChild(label);
                    const x = document.createElement('button'); x.className = 'multi-select-chip-x'; x.innerHTML = '&times;'; x.type = 'button';
                    x.addEventListener('click', e => { e.stopPropagation(); selectedClientIds = selectedClientIds.filter(id => id !== cid); renderBox(); renderOpts(searchInput.value); });
                    chip.appendChild(x); box.appendChild(chip);
                });
            }
        }
        function renderOpts(f) {
            const q = (f||'').toLowerCase();
            const fl = items.filter(i => (!q || i.label.toLowerCase().includes(q)) && !selectedClientIds.includes(i.id));
            optionsList.innerHTML = '';
            if (!fl.length) { const e = document.createElement('div'); e.className = 'search-select-option empty'; e.textContent = selectedClientIds.length ? 'Все клиенты добавлены' : 'Ничего не найдено'; optionsList.appendChild(e); return; }
            fl.forEach(item => {
                const o = document.createElement('div'); o.className = 'search-select-option'; o.textContent = item.label;
                o.addEventListener('click', e => { e.stopPropagation(); selectedClientIds.push(item.id); renderBox(); renderOpts(searchInput.value); });
                optionsList.appendChild(o);
            });
        }

    async function ensureCabinetToken(uuid) {
        try {
            const r = await authFetch('/api/client/' + uuid + '/ensure-cabinet', { method: 'POST' });
            if (r.ok) { const d = await r.json(); return d.cabinet_token || null; }
        } catch {}
        return null;
    }

    async function updateClientActions() {
        const cabinetBtn = document.getElementById('clientCabinetBtn');
        const cardBtn = document.getElementById('clientCardBtn');
        if (!cabinetBtn || !cardBtn) return;
        if (selectedClientData) {
            const c = selectedClientData;
            if (!c.cabinet_token && c.uuid) c.cabinet_token = await ensureCabinetToken(c.uuid);
            if (c.cabinet_token) {
                cabinetBtn.href = '/cabinet/' + encodeURIComponent(c.cabinet_token) + '?from=proposal&proposal_token=' + encodeURIComponent(TOKEN);
                cabinetBtn.style.display = '';
            } else { cabinetBtn.style.display = 'none'; }
            cardBtn.href = '/client/' + c.uuid;
            cardBtn.style.display = '';
        } else {
            cabinetBtn.style.display = 'none';
            cardBtn.style.display = 'none';
        }
    }

    function getDesignType() { return document.getElementById('fDesign')?.value || proposalData.design_type || 'no_design'; }

    function findToggleDiscount() {
        const items = (proposalData.estimation?.overhead?.custom_items) || [];
        return items.findIndex(ci => ci._toggle_discount);
    }

    function isDiscountEnabled() {
        return findToggleDiscount() >= 0;
    }

    function getDiscountPercent() {
        const idx = findToggleDiscount();
        if (idx >= 0) return Math.abs(proposalData.estimation.overhead.custom_items[idx].percent || 15);
        return 15;
    }

    function getDiscountExpires() {
        const idx = findToggleDiscount();
        if (idx >= 0) return proposalData.estimation.overhead.custom_items[idx].expires_at || '';
        return '';
    }

    function buildDiscountToggleHtml(overhead) {
        const enabled = isDiscountEnabled();
        const pct = getDiscountPercent();
        const expires = getDiscountExpires();
        return '<div class="discount-toggle-row' + (enabled ? '' : ' inactive') + '" id="discountRow">'
            + '<label class="toggle-switch"><input type="checkbox" id="discountToggle"' + (enabled ? ' checked' : '') + '><span class="toggle-slider"></span></label>'
            + '<span class="discount-label"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>Скидка на проект<span class="discount-hint">Отображается клиенту в КП</span></span>'
            + '<div class="discount-pct-wrap">'
            + '<input class="discount-pct-input" type="number" min="1" max="100" id="discountPct" value="' + pct + '"' + (enabled ? '' : ' disabled') + '><span style="font-size:.82rem;color:var(--text-dim)">%</span>'
            + '<span style="font-size:.72rem;color:var(--text-dim);margin:0 6px">до</span>'

            + '</div>';
    }

    function initDiscountToggle() {
        const toggle = document.getElementById('discountToggle');
        const pctInput = document.getElementById('discountPct');
        const expiresInput = document.getElementById('discountExpires');
        const row = document.getElementById('discountRow');
        if (!toggle || !pctInput) return;

        toggle.addEventListener('change', function() {
            const items = proposalData.estimation.overhead.custom_items || [];
            if (toggle.checked) {
                const pct = parseInt(pctInput.value) || 15;
                const expires = expiresInput ? expiresInput.value : '';
                items.push({ _toggle_discount: true, name: 'Скидка ' + pct + '%', percent: -Math.abs(pct), expires_at: expires || null });
                proposalData.estimation.overhead.custom_items = items;
                pctInput.disabled = false;
                if (expiresInput) expiresInput.disabled = false;
                row.classList.remove('inactive');
            } else {
                const idx = findToggleDiscount();
                if (idx >= 0) items.splice(idx, 1);
                pctInput.disabled = true;
                if (expiresInput) expiresInput.disabled = true;
                row.classList.add('inactive');
            }
            renderEditor();
        });

        pctInput.addEventListener('input', function() {
            const idx = findToggleDiscount();
            if (idx >= 0) {
                const pct = parseInt(pctInput.value) || 15;
                proposalData.estimation.overhead.custom_items[idx].percent = -Math.abs(pct);
                proposalData.estimation.overhead.custom_items[idx].name = 'Скидка ' + pct + '%';
                recalcTotals();
            }
        });

        if (expiresInput) {
            expiresInput.addEventListener('change', function() {
                const idx = findToggleDiscount();
                if (idx >= 0) {
                    proposalData.estimation.overhead.custom_items[idx].expires_at = expiresInput.value || null;
                }
            });
        }
    }

    function handleDesignChange() {
        const dt = document.getElementById('fDesign').value;
        const section = document.getElementById('stageSection_design');
        const modules = proposalData.estimation.modules;
        const hasDesignModules = modules.some(m => m.stage === 'design');

        if (dt === 'no_design') {
            section.style.display = 'none';
            recalcTotals();
        } else {
            section.style.display = '';
            if (!hasDesignModules) {
                const tpl = DESIGN_MODULE_TEMPLATES[dt] || DESIGN_MODULE_TEMPLATES.full_design;
                const newMod = JSON.parse(JSON.stringify(tpl));
                newMod.total = newMod.sub_items.reduce((s, si) => s + si.hours, 0);
                modules.push(newMod);
                renderModules();
                recalcTotals();
                showToast('Добавлен модуль дизайна');
            }
        }
    }

    function renderModules() {
        STAGES.forEach(st => {
            const container = document.getElementById('modules_' + st.key);
            if (!container) return;
            container.innerHTML = '';
            const modules = proposalData.estimation.modules || [];
            let hasAny = false;
            modules.forEach((mod, idx) => {
                if (mod.stage === st.key) {
                    container.appendChild(createModuleCard(mod, idx));
                    hasAny = true;
                }
            });
            if (!hasAny) {
                const hint = document.createElement('div');
                hint.className = 'stage-empty-hint';
                hint.textContent = 'Нет модулей в этом разделе';
                container.appendChild(hint);
            }
        });
    }

    function createModuleCard(mod, idx) {
        const card = document.createElement('div'); card.className = 'module-card'; card.dataset.idx = idx;
        const subItems = mod.sub_items || [];
        const total = subItems.reduce((s, si) => s + (si.hours || 0), 0);
        mod.total = total;
        let itemsHtml = '';
        subItems.forEach((si, siIdx) => {
            itemsHtml += '<div class="work-item" data-si="'+siIdx+'"><input class="work-item-name" value="'+escapeHtml(si.name||'')+'" placeholder="Название работы"><input class="work-item-hours" type="number" min="0" value="'+(si.hours||0)+'"><span class="work-item-unit">ч</span><span class="work-item-delete" data-mod="'+idx+'" data-si="'+siIdx+'" title="Удалить">&times;</span></div>';
        });
        card.innerHTML = '<div class="module-header"><svg class="module-collapse-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg><input class="module-name-input" value="'+escapeHtml(mod.name||'Новый модуль')+'" placeholder="Название модуля"><span class="module-hours-badge" id="modBadge_'+idx+'">'+total+' ч</span><span class="module-delete-btn" data-mod="'+idx+'" title="Удалить модуль"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></span></div><div class="module-body"><div class="work-items-list">'+itemsHtml+'</div><span class="add-row-btn add-work-btn" data-mod="'+idx+'" style="margin-top:6px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Добавить работу</span></div>';
        card.querySelector('.module-header').addEventListener('click', e => { if (e.target.closest('.module-name-input') || e.target.closest('.module-delete-btn')) return; card.classList.toggle('collapsed'); });
        card.querySelector('.module-name-input').addEventListener('input', e => { proposalData.estimation.modules[idx].name = e.target.value; });
        card.querySelectorAll('.work-item').forEach(row => {
            const siIdx = parseInt(row.dataset.si);
            row.querySelector('.work-item-name').addEventListener('input', e => { proposalData.estimation.modules[idx].sub_items[siIdx].name = e.target.value; });
            row.querySelector('.work-item-hours').addEventListener('input', e => { proposalData.estimation.modules[idx].sub_items[siIdx].hours = parseInt(e.target.value)||0; updateModuleBadge(idx); recalcTotals(); });
        });
        return card;
    }

    let _delegationInit = false;
    function initModulesDelegation() {
        if (_delegationInit) return;
        _delegationInit = true;
        document.addEventListener('click', function(e) {
            const delBtn = e.target.closest('.module-delete-btn');
            if (delBtn) {
                e.stopPropagation();
                const idx = parseInt(delBtn.dataset.mod);
                if (!isNaN(idx) && proposalData.estimation.modules[idx]) {
                    proposalData.estimation.modules.splice(idx, 1);
                    renderModules();
                    recalcTotals();
                }
                return;
            }
            const workDel = e.target.closest('.work-item-delete');

    function recalcTotals() {
        const est = proposalData.estimation;
        const modules = est.modules || [];
        const rate = parseFloat(document.getElementById('fHourlyRate')?.value) || proposalData.hourly_rate || 0;
        const currency = document.getElementById('fCurrency')?.value || proposalData.currency || '$';
        const designOff = getDesignType() === 'no_design';
        const activeModules = designOff ? modules.filter(m => m.stage !== 'design') : modules;
        const devHours = activeModules.reduce((s, m) => s + (m.total || 0), 0);
        const fmt = v => { if (currency==='₽') return v.toLocaleString('ru-RU')+' ₽'; if (currency==='€') return '€'+v.toLocaleString('en-US'); return '$'+v.toLocaleString('en-US'); };

        const pmPct = parseFloat(document.querySelector('[data-over-pct="pm"]')?.value) || 0;
        const qaPct = parseFloat(document.querySelector('[data-over-pct="qa"]')?.value) || 0;
        const mktPct = parseFloat(document.querySelector('[data-over-pct="mkt"]')?.value) || 0;
        const pmHours = Math.round(devHours * pmPct / 100);
        const qaHours = Math.round(devHours * qaPct / 100);
        const mktHours = Math.round(devHours * mktPct / 100);

        var sellerPct = 0; var sellerHours = 0;
        const sellerInput = document.querySelector('[data-over-pct="seller"]');
        if (sellerInput) { sellerPct = parseFloat(sellerInput.value) || 0; sellerHours = Math.round(devHours * sellerPct / 100); }

        const customItems = est.overhead.custom_items || [];
        var customTotalHours = 0;
        customItems.forEach(function(ci, i) {
            const inp = document.querySelector('[data-over-pct="custom_'+i+'"]');
            if (inp) { ci.percent = parseFloat(inp.value) || 0; }
            const nameInp = document.querySelector('[data-over-name="custom_'+i+'"]');
            if (nameInp) ci.name = nameInp.value.trim() || ci.name;
            const h = Math.round(devHours * (ci.percent || 0) / 100);
            customTotalHours += h;
            const hEl = document.querySelector('[data-over-hours="custom_'+i+'"]');
            const cEl = document.querySelector('[data-over-cost="custom_'+i+'"]');
            if (hEl) hEl.textContent = (h >= 0 ? '' : '') + h + ' ч';
            if (cEl) cEl.textContent = (h < 0 ? '−' : '') + fmt(Math.abs(Math.round(h * rate)));
        });

        const overheadPositive = pmHours + qaHours + mktHours + sellerHours;
        const totalHours = Math.max(0, devHours + overheadPositive + customTotalHours);
        const totalCost = Math.round(totalHours * rate * 100) / 100;

        est.overhead = { pm_percent: pmPct, qa_percent: qaPct, marketing_percent: mktPct, custom_items: customItems };
        if (proposalData.seller_id) est.overhead.seller_percent = sellerPct;
        est.totals = { dev_hours: devHours, pm_hours: pmHours, qa_hours: qaHours, marketing_hours: mktHours, seller_hours: sellerHours, total_hours: totalHours, total_cost: totalCost };

        function updateOver(id, hours) {
            const hEl = document.querySelector('[data-over-hours="'+id+'"]');
            const cEl = document.querySelector('[data-over-cost="'+id+'"]');
            if (hEl) hEl.textContent = hours + ' ч';
            if (cEl) cEl.textContent = fmt(Math.round(hours * rate));
        }
        updateOver('pm', pmHours);
        updateOver('qa', qaHours);
        updateOver('mkt', mktHours);
        if (sellerInput) updateOver('seller', sellerHours);

        const card = document.getElementById('totalsCard'); if (!card) return;
        const oh = overheadPositive + customTotalHours;
        var discountLine = '';
        if (customTotalHours < 0) {
            discountLine = '<div class="totals-row"><span class="totals-label" style="color:var(--green)">Скидки</span><span class="totals-value" style="color:var(--green)">−'+fmt(Math.abs(Math.round(customTotalHours*rate)))+'</span></div>';
        }
        card.innerHTML = '<div class="totals-row"><span class="totals-label">Разработка (дизайн + код)</span><span class="totals-value">'+devHours+' ч &nbsp; '+fmt(Math.round(devHours*rate))+'</span></div>'
            + '<div class="totals-row"><span class="totals-label">Накладные расходы</span><span class="totals-value">'+(overheadPositive)+' ч &nbsp; '+fmt(Math.round(overheadPositive*rate))+'</span></div>'
            + discountLine
            + '<div class="totals-row grand"><span class="totals-label">Итого</span><span class="totals-value accent">'+totalHours+' ч</span></div>'
            + '<div class="totals-row grand"><span class="totals-label">Стоимость ('+rate+' '+currency+'/ч)</span><span class="totals-value green">'+fmt(totalCost)+'</span></div>';
        renderPaymentPhases();
    }

    function buildStagesFromModules() {
        const est = proposalData.estimation;
        const modules = est.modules || [];
        const overhead = est.overhead || {};
        const rate = parseFloat(document.getElementById('fHourlyRate')?.value) || proposalData.hourly_rate || 0;
        const designType = getDesignType();
        const stages = [];
        const stageMap = { design: [], dev: [] };
        modules.forEach(m => {
            const s = (m.stage === 'design') ? 'design' : 'dev';
            stageMap[s].push(m);
        });

        const allModHours = modules.reduce((s, m) => s + (m.total || 0), 0);
        const pmPct = overhead.pm_percent || 0;
        const qaPct = overhead.qa_percent || 0;
        const mktPct = overhead.marketing_percent || 0;
        const sellerPct = overhead.seller_percent || 0;
        var customPctSum = 0;
        (overhead.custom_items || []).forEach(ci => { customPctSum += (ci.percent || 0); });
        const totalOverPct = pmPct + qaPct + mktPct + sellerPct + customPctSum;
        const overheadTotal = Math.round(allModHours * totalOverPct / 100);

        ['design', 'dev'].forEach(key => {
            if (key === 'design' && designType === 'no_design') return;
            const mods = stageMap[key] || [];
            if (mods.length === 0 && key !== 'dev') return;
            const tasks = [];
            mods.forEach(m => { (m.sub_items || []).forEach(si => { if (si.name || si.hours) tasks.push({ name: si.name || 'Задача', hours: si.hours || 0, module: m.name }); }); });
            const stageHours = mods.reduce((s, m) => s + (m.total || 0), 0);
            const overheadShare = allModHours > 0 ? Math.round(overheadTotal * stageHours / allModHours) : 0;
            stages.push({ name: key === 'design' ? 'UX/UI Дизайн' : 'Разработка приложения', tasks: tasks, _hours: stageHours, _cost: Math.round((stageHours + overheadShare) * rate) });
        });

        const qaHours = Math.round(allModHours * qaPct / 100);
        if (qaHours > 0) {
            stages.push({ name: 'Тестирование, отладка и деплой', tasks: [{ name: 'QA, тестирование и запуск', hours: qaHours }], _hours: qaHours, _cost: Math.round(qaHours * rate) });
        }

        est.stages = stages;
    }

    function getPaymentPhases() {

    function computePaymentPhases() {
        const est = proposalData.estimation;
        const modules = est.modules || [];
        const overhead = est.overhead || {};
        const designType = getDesignType();
        const rate = parseFloat(document.getElementById('fHourlyRate')?.value) || proposalData.hourly_rate || 0;
        const currency = document.getElementById('fCurrency')?.value || proposalData.currency || '₽';

        const designMods = [], devMods = [];
        modules.forEach(m => {
            const stage = m.stage || 'dev';
            if (stage === 'design' && designType === 'no_design') return;
            const h = (m.sub_items || []).reduce((s, si) => s + (si.hours || 0), 0);
            const entry = { name: m.name || '', hours: h };
            if (stage === 'design' && designType !== 'no_design') designMods.push(entry);
            else devMods.push(entry);
        });

        const baseH = [...designMods, ...devMods].reduce((s, e) => s + e.hours, 0);
        const jr = x => x >= 0 ? Math.floor(x + 0.5) : -Math.floor(-x + 0.5);
        const pmH = jr(baseH * (overhead.pm_percent || 0) / 100);
        const qaH = jr(baseH * (overhead.qa_percent || 0) / 100);
        const mktH = jr(baseH * (overhead.marketing_percent || 0) / 100);
        const sellerH = jr(baseH * (overhead.seller_percent || 0) / 100);
        const customH = (overhead.custom_items || []).reduce((s, ci) => s + jr(baseH * (ci.percent || 0) / 100), 0);
        const totalHours = Math.max(0, baseH + pmH + qaH + mktH + sellerH + customH);
        const totalCost = jr(totalHours * rate);
        if (totalCost <= 0) return [];

        const hasDesign = designMods.reduce((s, d) => s + d.hours, 0) > 0 && designType !== 'no_design';
        const half = Math.max(1, Math.floor(devMods.length / 2));
        const mainMods = devMods.slice(0, half);
        const restMods = devMods.slice(half);

        const scopes = hasDesign ? [
            { name: 'Аналитика и дизайн', pct: 25, deliverables: designMods.map(d => d.name).concat(['Техническое задание', 'Архитектура решения']) },
            { name: 'Разработка ключевого функционала', pct: 35, deliverables: mainMods.map(m => m.name) },
            { name: 'Интеграции и доработки', pct: 25, deliverables: restMods.map(m => m.name) },
            { name: 'Тестирование и запуск', pct: 15, deliverables: ['Полное тестирование', 'Исправление замечаний', 'Запуск в продакшн'] },
        ] : [
            { name: 'Аналитика и проектирование', pct: 25, deliverables: ['Техническое задание', 'Архитектура решения', 'Прототип интерфейса'] },
            { name: 'Разработка ключевого функционала', pct: 35, deliverables: mainMods.map(m => m.name) },
            { name: 'Интеграции и доработки', pct: 25, deliverables: restMods.map(m => m.name) },
            { name: 'Тестирование и запуск', pct: 15, deliverables: ['Полное тестирование', 'Исправление замечаний', 'Запуск в продакшн'] },
        ];

        const existing = getPaymentPhases();
        let assigned = 0;
        const phases = scopes.map((sc, i) => {
            const isLast = i === scopes.length - 1;
            const cost = isLast ? totalCost - assigned : Math.round(totalCost * sc.pct / 100);
            assigned += cost;
            const prev = existing[i] || {};
            return {
                name: sc.name,
                cost,
                deliverables: sc.deliverables.filter(Boolean),
                status: prev.status || 'pending',
                paid_at: prev.paid_at || null,
                comment: prev.comment || '',
            };
        });
        return phases;
    }

    function renderPaymentPhases() {
        const container = document.getElementById('payPhasesSection');
        if (!container) return;
        const phases = computePaymentPhases();
        proposalData.estimation.payment_phases = phases;
        const currency = document.getElementById('fCurrency')?.value || proposalData.currency || '₽';
        const fmt = n => n.toLocaleString('ru-RU');
        let h = '';
        phases.forEach((pp, i) => {
            const isPaid = pp.status === 'paid';
            const numCls = isPaid ? ' paid' : '';
            const statusCls = isPaid ? 'paid' : 'pending';
            const statusText = isPaid ? '✓ Оплачено' : 'Ожидает';
            const delivs = (pp.deliverables || []).map(d => '<span class="pay-phase-deliv">' + escapeHtml(d) + '</span>').join('');
            const dateStr = pp.paid_at ? '<div class="pay-phase-date">Оплата: ' + escapeHtml(pp.paid_at) + (pp.comment ? ' — ' + escapeHtml(pp.comment) : '') + '</div>' : '';
            h += '<div class="pay-phase" data-phase-idx="' + i + '">'
                + '<div class="pay-phase-num' + numCls + '">' + (i + 1) + '</div>'
                + '<div class="pay-phase-body">'
                + '<div class="pay-phase-top">'
                + '<div class="pay-phase-name">' + escapeHtml(pp.name) + '</div>'
                + '<div class="pay-phase-cost">' + fmt(pp.cost) + ' ' + currency + '</div>'
                + '<div class="pay-phase-status ' + statusCls + '" data-pay-idx="' + i + '">' + statusText + '</div>'
                + '</div>'
                + (delivs ? '<div class="pay-phase-delivs">' + delivs + '</div>' : '')
                + dateStr
                + '</div></div>';
        });
        container.innerHTML = h;
    }

    function getDocIconClass(name) {
        const ext = (name || '').split('.').pop().toLowerCase();
        if (ext === 'pdf') return 'pdf';
        if (['png','jpg','jpeg','gif','svg','webp'].includes(ext)) return 'img';
        if (['doc','docx','xls','xlsx','txt'].includes(ext)) return 'doc';
        return 'other';
    }
    function getDocExt(name) { return (name || '').split('.').pop().toUpperCase().slice(0,4); }
    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' Б';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' КБ';
        return (bytes / 1048576).toFixed(1) + ' МБ';
    }
    function formatDocDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString('ru-RU', { day:'numeric', month:'short', year:'numeric' });
    }

    async function loadDocuments() {
