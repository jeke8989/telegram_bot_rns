<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — НейроСофт</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tokens.css?v=1772292397">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #787cf5;
            --primary-light: rgba(120,124,245,.08);
            --primary-border: rgba(120,124,245,.2);
            --bg: #f5f5fa;
            --surface: #fff;
            --surface-2: #f0f0f5;
            --surface-3: #eaeaf0;
            --border: #e8e9f0;
            --text: #1a1a2e;
            --text-dim: #6b7085;
            --text-light: #9b9fb5;
            --accent: #787cf5;
            --accent-glow: rgba(120,124,245,.15);
            --radius: 16px;
            --radius-sm: 10px;
            --font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --shadow: 0 2px 16px rgba(26,26,46,.06);
            --shadow-md: 0 4px 24px rgba(26,26,46,.08);
            --green: #00cec9;
            --green-bg: rgba(0,206,201,.08);
            --amber: #f59e0b;
            --amber-bg: rgba(245,158,11,.08);
            --coral: #e17355;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

        /* NAV */
        .nav { position:sticky; top:0; z-index:100; background:rgba(255,255,255,.88); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
        .nav-inner { max-width:960px; margin:0 auto; padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; }
        .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--text); }
        .nav-logo img { width:32px; height:32px; border-radius:8px; }
        .nav-logo span { font-weight:700; font-size:15px; }
        .nav-right { display:flex; align-items:center; gap:12px; }
        .nav-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:100px; background:var(--primary-light); color:var(--primary); font-size:13px; font-weight:600; text-decoration:none; border:none; cursor:pointer; transition:.2s; }
        .nav-btn:hover { background:var(--primary); color:#fff; }
        .nav-btn svg { width:14px; height:14px; }


        /* LOADING / ERROR */
        .loading-page { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; gap:16px; color:var(--text-dim); font-size:14px; font-weight:500; }
        .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .error-page { display:none; min-height:80vh; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; }
        .error-icon { width:80px; height:80px; border-radius:50%; background:var(--primary-light); display:flex; align-items:center; justify-content:center; margin-bottom:24px; }
        .error-icon svg { width:36px; height:36px; color:var(--primary); }
        .error-page h2 { font-size:22px; font-weight:800; margin-bottom:8px; }
        .error-page p { color:var(--text-dim); font-size:15px; margin-bottom:24px; line-height:1.5; }
        .error-btn { display:inline-flex; align-items:center; gap:8px; padding:12px 28px; border-radius:100px; background:var(--primary); color:#fff; font-size:14px; font-weight:600; text-decoration:none; transition:opacity .2s; }
        .error-btn:hover { opacity:.85; }

        /* HERO */
        .hero { background:linear-gradient(135deg,#1a1030 0%,#2d1b69 50%,#1e1245 100%); padding:40px 0 48px; color:#fff; position:relative; overflow:hidden; }
        .hero::before { content:''; position:absolute; top:-50%; right:-20%; width:500px; height:500px; background:radial-gradient(circle,rgba(120,124,245,.15),transparent 70%); pointer-events:none; }
        .hero-inner { max-width:960px; margin:0 auto; padding:0 24px; position:relative; z-index:1; }
        .hero-welcome { font-size:14px; font-weight:500; color:rgba(255,255,255,.5); margin-bottom:4px; }
        .hero-company { font-size:12px; font-weight:600; color:rgba(255,255,255,.3); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:12px; }
        .hero-name { font-size:clamp(22px,4vw,32px); font-weight:800; line-height:1.2; letter-spacing:-.5px; }

        /* PROJECT TABS */
        .project-tabs { max-width:960px; margin:0 auto; padding:0 24px; }
        .project-tabs-bar { display:flex; gap:4px; overflow-x:auto; padding:16px 0 0; -webkit-overflow-scrolling:touch; }
        .project-tabs-bar::-webkit-scrollbar { display:none; }
        .project-tab { padding:10px 20px; border-radius:12px 12px 0 0; background:var(--surface); border:1px solid var(--border); border-bottom:none; font-size:14px; font-weight:600; color:var(--text-dim); cursor:pointer; white-space:nowrap; transition:.2s; position:relative; top:1px; }
        .project-tab:hover { color:var(--text); }
        .project-tab.active { color:var(--primary); background:var(--bg); border-color:var(--primary-border); }

        /* CONTENT */
        .content { max-width:960px; margin:0 auto; padding:0 24px 48px; }

        /* INNER TABS */
        .inner-tabs { display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:4px; margin:20px 0; }
        .inner-tab { flex:1; padding:10px 12px; border-radius:9px; border:none; background:transparent; font-family:inherit; font-size:13px; font-weight:600; color:var(--text-dim); cursor:pointer; transition:all .2s; text-align:center; white-space:nowrap; display:flex; align-items:center; justify-content:center; gap:6px; }
        .inner-tab:hover { color:var(--text); background:var(--surface-2); }
        .inner-tab.active { background:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(120,124,245,.3); }
        .inner-tab svg { width:15px; height:15px; flex-shrink:0; }
        .inner-tab-badge { font-size:11px; font-weight:700; background:rgba(255,255,255,.2); padding:1px 6px; border-radius:6px; }
        .inner-tab.active .inner-tab-badge { background:rgba(255,255,255,.25); }
        .inner-tab:not(.active) .inner-tab-badge { background:var(--surface-2); }
        .tab-pane { display:none; }
        .tab-pane.active { display:block; }

        /* STATS ROW */
        .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:20px 0; }
        .stat-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); padding:16px 14px; text-align:center; transition:transform .2s,box-shadow .2s; position:relative; overflow:hidden; }
        .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:var(--radius) var(--radius) 0 0; }
        .stat-card:nth-child(1)::before { background:linear-gradient(90deg,#787cf5,#a78bfa); }
        .stat-card:nth-child(2)::before { background:linear-gradient(90deg,#f59e0b,#fbbf24); }
        .stat-card:nth-child(3)::before { background:linear-gradient(90deg,#00cec9,#34d399); }
        .stat-card:nth-child(4)::before { background:linear-gradient(90deg,#e17355,#fb923c); }
        .stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
        .stat-icon { width:36px; height:36px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:8px; font-size:16px; }
        .stat-icon.i-budget { background:var(--primary-light); }
        .stat-icon.i-hours { background:var(--green-bg); }
        .stat-icon.i-modules { background:var(--amber-bg); }
        .stat-icon.i-meetings { background:rgba(225,115,85,.08); }
        .stat-value { font-size:22px; font-weight:800; letter-spacing:-.5px; margin-bottom:2px; }
        .stat-label { font-size:11px; font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; }

        /* CARDS */
        .section { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); padding:24px; margin-bottom:16px; }
        .section-hdr { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
        .section-icon { width:36px; height:36px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .section-icon svg { width:18px; height:18px; }
        .section-icon.purple { background:var(--primary-light); color:var(--primary); }
        .section-icon.green { background:var(--green-bg); color:var(--green); }
        .section-icon.amber { background:var(--amber-bg); color:var(--amber); }
        .section-title { font-size:16px; font-weight:700; }
        .section-badge { margin-left:auto; font-size:12px; font-weight:600; color:var(--text-dim); background:var(--bg); padding:4px 10px; border-radius:100px; }

        /* CHARTS ROW */
        .charts-row { display:grid; grid-template-columns:1fr; gap:16px; margin-bottom:16px; }
        .chart-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border); padding:24px; }
        .chart-title { font-size:14px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .chart-title-dot { width:8px; height:8px; border-radius:50%; }
        .chart-layout { display:flex; align-items:center; gap:32px; }
        .chart-canvas-wrap { width:180px; height:180px; flex-shrink:0; }
        .chart-canvas-wrap canvas { width:100%!important; height:100%!important; }
        .chart-legend { flex:1; display:flex; flex-direction:column; gap:10px; }
        .chart-legend-item { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text); font-weight:500; }
        .chart-legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .chart-legend-hours { margin-left:auto; font-size:12px; color:var(--text-dim); font-weight:600; white-space:nowrap; }

        /* MODULES */
        .module-row { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg); }
        .module-row + .module-row { margin-top:6px; }
        .module-num { width:28px; height:28px; border-radius:8px; background:var(--primary-light); color:var(--primary); font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .module-info { flex:1; min-width:0; }
        .module-name { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .module-bar { height:6px; border-radius:3px; background:var(--border); margin-top:6px; overflow:hidden; }
        .module-bar-fill { height:100%; border-radius:3px; transition:width .6s ease; }
        .module-hours { font-size:13px; font-weight:600; color:var(--text-dim); white-space:nowrap; flex-shrink:0; }

        /* DOCS */
        .doc-link { display:flex; align-items:center; gap:14px; padding:14px 16px; background:var(--bg); border-radius:var(--radius-sm); border:1px solid var(--border); text-decoration:none; color:var(--text); transition:.2s; cursor:pointer; }
        .doc-link + .doc-link { margin-top:8px; }
        .doc-link:hover { border-color:var(--primary-border); background:var(--primary-light); }
        .doc-icon { width:40px; height:40px; border-radius:var(--radius-sm); background:var(--primary-light); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--primary); }
        .doc-icon svg { width:20px; height:20px; }
        .doc-info { flex:1; min-width:0; }
        .doc-name { font-size:14px; font-weight:600; }
        .doc-meta { font-size:12px; color:var(--text-dim); margin-top:2px; }
        .doc-arrow { color:var(--text-light); flex-shrink:0; transition:transform .2s; }
        .doc-link:hover .doc-arrow { color:var(--primary); transform:translateX(3px); }
        .doc-arrow svg { width:16px; height:16px; }

        /* CHAT */
        .chat-section { padding:0; overflow:hidden; }
        .chat-section .section-hdr { padding:24px 24px 0; margin-bottom:0; }
        .chat-wrap { --bg:#fff; --surface:#f5f5fa; --border:#e8e9f0; --text:#1a1a2e; --text-dim:#6b7085; --accent:#787cf5; }
        .chat-wrap .cw-wrap { border:none; border-radius:0; }
        .chat-wrap .cw-header { display:none; }
        .chat-wrap .cw-msg-in { background:#f0f0f5; color:#1a1a2e; }
        .chat-wrap .cw-msg-out { background:rgba(120,124,245,.1); color:#1a1a2e; }
        .chat-wrap .cw-input-bar { border-top:1px solid #e8e9f0; }
        .chat-wrap .cw-input { background:#f5f5fa; border-color:#e8e9f0; color:#1a1a2e; }
        .chat-wrap .cw-empty { color:#6b7085; }

        /* HERO DESC */
        .hero-desc { font-size:14px; color:rgba(255,255,255,.55); margin-top:10px; line-height:1.6; max-width:600px; }
        .hero-badges { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
        .hero-badge { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); border-radius:100px; font-size:12px; font-weight:600; color:rgba(255,255,255,.7); }

        /* STAGES STEPPER */
        .stages-list { display:flex; flex-direction:column; gap:0; }
        .stage-item { position:relative; padding-left:36px; padding-bottom:24px; }
        .stage-item:last-child { padding-bottom:0; }
        .stage-line { position:absolute; left:14px; top:28px; bottom:0; width:2px; background:var(--border); }
        .stage-item:last-child .stage-line { display:none; }
        .stage-dot { position:absolute; left:7px; top:4px; width:16px; height:16px; border-radius:50%; background:var(--primary-light); border:2px solid var(--primary); }
        .stage-hdr { font-size:14px; font-weight:700; margin-bottom:6px; }
        .stage-tasks { display:flex; flex-direction:column; gap:3px; }
        .stage-task { font-size:13px; color:var(--text-dim); display:flex; align-items:center; gap:6px; }
        .stage-task-hours { font-weight:600; color:var(--text); margin-left:auto; white-space:nowrap; }
        .stage-cost { font-size:13px; font-weight:600; color:var(--primary); margin-top:6px; }
        .stage-total-row { display:flex; justify-content:space-between; padding:14px 16px; font-weight:700; font-size:14px; border-top:2px solid var(--border); margin-top:8px; color:var(--primary); }
        .stage-module { margin-top:10px; }
        .stage-module:first-child { margin-top:0; }
        .stage-module-hdr { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .stage-module-num { width:22px; height:22px; border-radius:6px; background:var(--primary-light); color:var(--primary); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .stage-module-name { font-size:13px; font-weight:700; color:var(--text); }
        .stage-module-hours { margin-left:auto; font-size:12px; font-weight:600; color:var(--text-dim); white-space:nowrap; }
        .stage-module-tasks { padding-left:30px; display:flex; flex-direction:column; gap:2px; }

        /* ROLES BREAKDOWN */
        .role-row { display:flex; align-items:center; gap:12px; padding:6px 0; }
        .role-label { font-size:13px; font-weight:600; width:80px; flex-shrink:0; }
        .role-bar { flex:1; height:8px; border-radius:4px; background:var(--border); overflow:hidden; }
        .role-bar-fill { height:100%; border-radius:4px; transition:width .6s ease; }
        .role-hours { font-size:13px; font-weight:600; color:var(--text-dim); width:50px; text-align:right; flex-shrink:0; }

        /* PERSPECTIVES */
        .persp-wrap { background:linear-gradient(135deg,#f8f6ff 0%,#f0f4ff 50%,#f6f0ff 100%); border-radius:var(--radius); padding:28px 24px 24px; position:relative; overflow:hidden; }
        .persp-wrap::before { content:''; position:absolute; top:-40px; right:-40px; width:160px; height:160px; background:radial-gradient(circle,rgba(124,93,250,.08) 0%,transparent 70%); pointer-events:none; }
        .persp-header { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
        .persp-header-icon { width:28px; height:28px; color:#7c5dfa; opacity:.7; flex-shrink:0; }
        .persp-header-title { font-size:15px; font-weight:600; color:var(--text); letter-spacing:-.01em; }
        .persp-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .persp-card { padding:14px 16px; background:rgba(255,255,255,.75); backdrop-filter:blur(4px); border-radius:10px; border:none; transition:transform .2s,box-shadow .2s; }
        .persp-card:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(124,93,250,.1); }
        .persp-card-dot { width:6px; height:6px; border-radius:50%; background:linear-gradient(135deg,#7c5dfa,#a78bfa); display:inline-block; margin-right:8px; vertical-align:middle; flex-shrink:0; }
        .persp-title { font-size:13px; font-weight:600; color:var(--text); margin-bottom:5px; display:flex; align-items:center; }
        .persp-desc { font-size:12.5px; color:#6b7280; line-height:1.55; padding-left:14px; }

        /* PAYMENT FUNNEL */
        .pay-list { display:flex; flex-direction:column; gap:0; }
        .pay-item { display:flex; flex-wrap:wrap; align-items:flex-start; gap:12px 14px; padding:14px 16px; border-bottom:1px solid var(--border); position:relative; }
        .pay-item:last-child { border-bottom:none; }
        .pay-item.active { background:var(--primary-light); border-radius:var(--radius-sm); border:1px solid var(--primary-border); margin:0 -1px; }
        .pay-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; margin-top:2px; }
        .pay-num.active { background:var(--primary); color:#fff; }
        .pay-num.pending { background:var(--border); color:var(--text-dim); }
        .pay-info { flex:1; min-width:0; }
        .pay-row-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .pay-name { font-size:14px; font-weight:600; }
        .pay-hours { font-size:12px; color:var(--text-dim); }
        .pay-deliv { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
        .pay-deliv-tag { display:inline-block; padding:2px 8px; background:rgba(124,93,250,.06); color:#6b5ce7; font-size:11px; font-weight:500; border-radius:4px; line-height:1.5; }
        .pay-cost { font-size:16px; font-weight:700; white-space:nowrap; }
        .pay-status { font-size:11px; font-weight:600; padding:3px 8px; border-radius:6px; white-space:nowrap; }
        .pay-status.current { background:var(--primary-light); color:var(--primary); }
        .pay-status.waiting { background:var(--bg); color:var(--text-light); }
        .pay-status.done { background:rgba(16,185,129,.1); color:#059669; }
        .pay-cta { margin-top:16px; padding:20px; background:linear-gradient(135deg,rgba(120,124,245,.06),rgba(167,139,250,.06)); border:1px solid var(--primary-border); border-radius:var(--radius); text-align:center; }
        .pay-cta-title { font-size:15px; font-weight:700; margin-bottom:4px; }
        .pay-cta-desc { font-size:13px; color:var(--text-dim); margin-bottom:14px; }
        .pay-cta-btn { display:inline-flex; align-items:center; gap:8px; padding:12px 28px; border-radius:100px; background:var(--primary); color:#fff; font-size:14px; font-weight:600; text-decoration:none; transition:opacity .2s; }
        .pay-cta-btn:hover { opacity:.85; }
        .pay-cta-btn svg { width:16px; height:16px; }
        .pay-btn-wrap { margin:20px 0 8px; display:flex; flex-direction:column; align-items:center; gap:10px; }
        .pay-cta-link { display:inline-block; font-size:13px; color:var(--text-dim); text-decoration:underline; text-underline-offset:3px; transition:color .2s; }
        .pay-cta-link:hover { color:var(--primary); }
        .pay-total { display:flex; justify-content:space-between; padding:14px 16px; font-weight:700; border-top:2px solid var(--border); margin-top:4px; }

        /* DISCOUNT BANNER */
        .discount-banner { background:#fff; border:1px solid #e5e7eb; border-radius:16px; padding:16px 22px; margin:16px 0 8px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; box-shadow:0 1px 3px rgba(0,0,0,.04); }
        .discount-tags { display:flex; flex-wrap:wrap; gap:8px; flex:1; min-width:0; }
        .discount-tag { display:inline-flex; align-items:center; gap:5px; padding:6px 14px; background:linear-gradient(135deg,#f0fdf4,#dcfce7); border:1px solid #bbf7d0; border-radius:100px; font-size:12px; font-weight:700; color:#16a34a; letter-spacing:-.01em; }
        .discount-tag svg { flex-shrink:0; opacity:.7; }
        .discount-info { text-align:right; flex-shrink:0; line-height:1.3; }
        .discount-old { font-size:16px; font-weight:700; color:#b0b8c4; text-decoration:line-through; }
        .discount-save { font-size:12px; font-weight:600; color:#16a34a; margin-top:2px; }
        @media(max-width:480px) { .discount-banner { flex-direction:column; align-items:stretch; gap:10px; padding:14px 16px; } .discount-info { text-align:left; } }

        /* PROMO BANNER */
        .promo-banner { background:linear-gradient(135deg,#1a1030 0%,#2d1b69 50%,#1e1245 100%); border-radius:var(--radius); padding:28px 28px 24px; margin:20px 0 4px; position:relative; overflow:hidden; color:#fff; }
        .promo-banner::before { content:''; position:absolute; top:-40%; right:-10%; width:300px; height:300px; background:radial-gradient(circle,rgba(120,124,245,.2),transparent 70%); pointer-events:none; }
        .promo-banner::after { content:''; position:absolute; bottom:-30%; left:-10%; width:250px; height:250px; background:radial-gradient(circle,rgba(167,139,250,.15),transparent 70%); pointer-events:none; }
        .promo-inner { position:relative; z-index:1; }
        .promo-tag { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; background:rgba(245,158,11,.15); border:1px solid rgba(245,158,11,.3); border-radius:100px; font-size:11px; font-weight:700; color:#fbbf24; text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; }
        .promo-title { font-size:clamp(18px,3.5vw,24px); font-weight:800; line-height:1.3; margin-bottom:6px; }
        .promo-subtitle { font-size:14px; color:rgba(255,255,255,.55); margin-bottom:20px; }
        .promo-prices { display:flex; align-items:baseline; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
        .promo-price-old { font-size:18px; font-weight:600; color:rgba(255,255,255,.35); text-decoration:line-through; }
        .promo-price-new { font-size:28px; font-weight:800; color:#fbbf24; }
        .promo-saving { font-size:13px; font-weight:600; color:rgba(0,206,201,.9); background:rgba(0,206,201,.12); padding:4px 10px; border-radius:6px; }
        .promo-timer { display:flex; gap:10px; margin-bottom:20px; }
        .promo-timer-block { display:flex; flex-direction:column; align-items:center; min-width:56px; padding:10px 8px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:10px; }
        .promo-timer-num { font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; }
        .promo-timer-label { font-size:10px; font-weight:600; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }
        .promo-cta { display:inline-flex; align-items:center; gap:8px; padding:13px 30px; border-radius:100px; background:linear-gradient(135deg,#f59e0b,#f97316); color:#fff; font-size:14px; font-weight:700; text-decoration:none; border:none; cursor:pointer; transition:opacity .2s,transform .15s; box-shadow:0 4px 20px rgba(245,158,11,.3); }
        .promo-cta:hover { opacity:.9; transform:translateY(-1px); }
        .promo-cta svg { width:16px; height:16px; }
        .promo-expired-msg { font-size:14px; color:rgba(255,255,255,.4); font-weight:600; }
        .promo-staff-note { display:inline-block; margin-top:12px; font-size:11px; color:rgba(255,255,255,.3); background:rgba(255,255,255,.06); padding:4px 10px; border-radius:6px; }
        .promo-banner.expired { opacity:.6; }
        .promo-banner.expired .promo-cta { display:none; }
        .promo-banner.expired .promo-prices { opacity:.5; }
        @media (max-width:640px) {
            .promo-banner { padding:22px 18px 20px; }
            .promo-timer { gap:6px; }
            .promo-timer-block { min-width:48px; padding:8px 6px; }
            .promo-timer-num { font-size:18px; }
            .promo-price-new { font-size:22px; }
        }

        /* EMPTY */
        .empty-state { text-align:center; padding:40px 16px; color:var(--text-dim); }
        .empty-state .empty-icon { font-size:40px; margin-bottom:12px; }
        .empty-state p { font-size:14px; line-height:1.5; }

        /* FOOTER */
        .footer { max-width:960px; margin:0 auto; padding:24px 24px 40px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
        .footer-copy { font-size:13px; color:var(--text-light); }
        .footer-copy a { color:var(--text-dim); text-decoration:none; font-weight:600; }
        .footer-copy a:hover { color:var(--primary); }
        .footer-links { display:flex; gap:20px; }
        .footer-links a { font-size:13px; color:var(--text-dim); text-decoration:none; font-weight:500; transition:color .2s; }
        .footer-links a:hover { color:var(--primary); }

        /* ANIMATIONS */
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .fade-up { animation:fadeUp .45s ease both; }

        /* RESPONSIVE */
        @media (max-width:768px) {
            .stats { grid-template-columns:repeat(2,1fr); }
            .charts-row { grid-template-columns:1fr; }
        }
        @media (max-width:640px) {
            .nav-inner { padding:0 16px; }
            .hero { padding:32px 0 40px; }
            .hero-inner { padding:0 16px; }
            .content { padding:0 12px 32px; }
            .project-tabs { padding:0 12px; }

            .stat-card { padding:14px 10px; }

            .section { padding:18px 16px; }
            .footer { padding:20px 12px 32px; flex-direction:column; text-align:center; }
            .chart-layout { flex-direction:column; gap:20px; }
            .chart-canvas-wrap { width:160px; height:160px; margin:0 auto; }
            .chart-legend { align-items:flex-start; }
            .chart-card { padding:18px 16px; }
            .inner-tabs { gap:2px; padding:3px; }
            .inner-tab { padding:8px 6px; font-size:12px; gap:4px; }
            .inner-tab svg { width:13px; height:13px; }
            .inner-tab-badge { font-size:10px; padding:1px 5px; }

        }
    </style>
</head>

<script>
(function() {
    'use strict';

    var COLORS = ['#787cf5','#00cec9','#f59e0b','#e17355','#a78bfa','#34d399','#fb923c','#38bdf8','#f472b6','#94a3b8'];
    var STATUS_MAP = { draft:'Черновик', sent:'Отправлено', approved:'Одобрено', in_progress:'В работе', completed:'Завершён' };

    var pathParts = window.location.pathname.split('/');
    var cabinetToken = pathParts[pathParts.length - 1];
    if (!cabinetToken) { showError(); return; }

    var DATA = null;
    var activeProjectIdx = 0;
    var budgetChart = null;
    var promoTimerInterval = null;

    fetch('/api/cabinet/' + cabinetToken)
        .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function(data) { try { DATA = data; init(); } catch(e) { console.error('Cabinet init error:', e); document.getElementById('errorState').querySelector('p').textContent = e.message + ' | ' + (e.stack||'').split('\n')[1]; showError(); } })
        .catch(function() { showError(); });

    function showError() {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('errorState').style.display = 'flex';
    }

    function esc(t) { var d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }
    function fmtCost(v, c) { if (!v) return '—'; var n = Number(v); return isNaN(n) ? v : (c||'$') + n.toLocaleString('ru-RU'); }
    function plural(n, one, two, five) { var a = Math.abs(n)%100, n1=a%10; if(a>10&&a<20) return five; if(n1>1&&n1<5) return two; return n1===1?one:five; }

    function init() {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('mainContent').style.display = '';

        var client = DATA.client || {};
        var isStaff = DATA.is_staff === true;
        var staff = DATA.staff || {};

        if (client.name) document.getElementById('heroWelcome').textContent = 'Добро пожаловать, ' + client.name;
        else document.getElementById('heroWelcome').textContent = 'Добро пожаловать';
        if (client.company) { var el = document.getElementById('heroCompany'); el.textContent = client.company; el.style.display = ''; }


        var projects = DATA.projects || [];
        var standalone = DATA.standalone_proposals || [];

        if (projects.length === 0 && standalone.length === 0) {
            document.getElementById('heroName').textContent = 'Ваш кабинет';
            renderEmpty(isStaff, staff);
            return;
        }

        if (projects.length === 0 && standalone.length > 0) {
            var virtualProject = buildVirtualProject(standalone);
            projects = [virtualProject];
            DATA.projects = projects;
        }

        if (projects.length > 0) {
            document.getElementById('heroName').textContent = projects[0].name || 'Ваш проект';
            document.title = (projects[0].name || 'Проект') + ' — Личный кабинет';
        }

        if (projects.length > 1) {
            document.getElementById('projectTabsWrap').style.display = '';
            renderTabs(projects);
        }

        renderDashboard(projects[0], isStaff, staff);
    }

    function buildVirtualProject(proposals) {
        var totalH = 0, totalC = 0, allMods = [], currency = '$';
        var first = proposals[0] || {};
        proposals.forEach(function(p) {
            var th = p.total_hours;
            totalH += Number((typeof th === 'object' && th) ? (th.max || th.min || 0) : (th || 0));
            var tc = p.total_cost;
            totalC += Number((typeof tc === 'object' && tc) ? (tc.max || tc.min || 0) : (tc || 0));
            (p.modules||[]).forEach(function(m) { allMods.push(m); });
            if (p.currency) currency = p.currency;
        });
        return {
            id: 0, name: first.project_name || 'Ваш проект',
            description: first.project_description_short || '',
            meeting_count: 0, created_at: null,
            proposals: proposals, total_hours: totalH, total_cost: totalC,
            currency: currency, modules: allMods,
            stages: first.stages || [],
            payment_phases: first.payment_phases || [],
            timeline_weeks: first.timeline_weeks,
            timeline_months: first.timeline_months,
            team_size: first.team_size,
            preparation_phase: first.preparation_phase,
            perspectives: first.perspectives || [],
            totals: first.totals || {},
            hourly_rate: first.hourly_rate || 0,
            creator: first.creator,
            is_virtual: true,
            discount_items: first.discount_items || [],
            base_cost_no_discount: first.base_cost_no_discount || 0,
        };
    }

    function renderTabs(projects) {
        var bar = document.getElementById('projectTabsBar');
        var html = '';
        projects.forEach(function(p, i) {
            html += '<div class="project-tab' + (i===0?' active':'') + '" data-idx="' + i + '">' + esc(p.name || 'Проект '+(i+1)) + '</div>';
        });
        bar.innerHTML = html;
        bar.addEventListener('click', function(e) {
            var tab = e.target.closest('.project-tab');
            if (!tab) return;
            var idx = parseInt(tab.dataset.idx);
            if (idx === activeProjectIdx) return;
            activeProjectIdx = idx;
            bar.querySelectorAll('.project-tab').forEach(function(t,i) { t.classList.toggle('active', i===idx); });
            var proj = DATA.projects[idx];
            document.getElementById('heroName').textContent = proj.name || 'Проект';
            document.title = (proj.name || 'Проект') + ' — Личный кабинет';
            renderDashboard(proj, DATA.is_staff, DATA.staff || {});
        });
    }

    function resolveRange(v) {
        if (!v) return 0;
        if (typeof v === 'object') return Number(v.max || v.min || 0);
        return Number(v) || 0;
    }

    function renderDashboard(project, isStaff, staff) {
        if (budgetChart) { budgetChart.destroy(); budgetChart = null; }
        chatInited = false;

        var area = document.getElementById('dashboardArea');
        var modules = project.modules || [];
        var proposals = project.proposals || [];
        var totalH = resolveRange(project.total_hours);
        var totalC = resolveRange(project.total_cost);
        var currency = project.currency || '$';
        var meetingCount = project.meeting_count || 0;
        var isKPMode = project.is_virtual === true;
        var timeline = project.timeline_months || project.timeline_weeks;
        var teamSize = project.team_size;
        var perspectives = project.perspectives || [];
        var stages = project.stages || [];
        var paymentPhases = project.payment_phases || [];
        var totals = project.totals || {};
        var creator = project.creator;

        // Hero badges
        var heroInner = document.querySelector('.hero-inner');
        var oldBadges = heroInner.querySelector('.hero-badges');
        if (oldBadges) oldBadges.remove();
        var oldDesc = heroInner.querySelector('.hero-desc');
        if (oldDesc) oldDesc.remove();

        if (project.description) {
            var descEl = document.createElement('p');
            descEl.className = 'hero-desc';
            descEl.textContent = project.description;
            heroInner.appendChild(descEl);
        }

        var badgesHtml = '';
        if (timeline) {
            var tw = resolveRange(timeline);
            if (tw) {
                var label = project.timeline_months ? plural(tw, 'месяц', 'месяца', 'месяцев') : plural(tw, 'неделя', 'недели', 'недель');
                badgesHtml += '<span class="hero-badge">📅 ' + tw + ' ' + label + '</span>';
            }
        }
        if (teamSize) {
            var ts = resolveRange(teamSize);
            if (ts) badgesHtml += '<span class="hero-badge">👥 ' + ts + ' ' + plural(ts, 'специалист', 'специалиста', 'специалистов') + '</span>';
        }
        if (modules.length) badgesHtml += '<span class="hero-badge">📦 ' + modules.length + ' ' + plural(modules.length, 'модуль', 'модуля', 'модулей') + '</span>';
        if (!isKPMode && meetingCount) badgesHtml += '<span class="hero-badge">🎥 ' + meetingCount + ' ' + plural(meetingCount, 'встреча', 'встречи', 'встреч') + '</span>';

        if (badgesHtml) {
            var badgeDiv = document.createElement('div');
            badgeDiv.className = 'hero-badges';
            badgeDiv.innerHTML = badgesHtml;
            heroInner.appendChild(badgeDiv);
        }

        var html = '';

        // Promo banner (always visible above tabs)
        var promo = DATA.promo || {};
        var promoActive = promo.enabled && promo.expires_at && !promo.expired;
        var promoShow = promo.enabled && promo.started_at;
        if (promoShow && totalC) {
            var discPct = promo.discount_percent || 10;
            var discountedTotal = Math.round(totalC * (1 - discPct / 100));
            var saving = Math.round(totalC - discountedTotal);
            var expiredClass = promo.expired ? ' expired' : '';
            html += '<div class="promo-banner fade-up' + expiredClass + '" id="promoBanner">';
            html += '<div class="promo-inner">';
            html += '<div class="promo-tag">⚡ Ограниченное предложение</div>';
            html += '<div class="promo-title">Скидка ' + discPct + '% на разработку проекта</div>';
            html += '<div class="promo-subtitle">Специальные условия для быстрого старта вашего проекта</div>';
            html += '<div class="promo-prices">';
            html += '<span class="promo-price-old">' + fmtCost(totalC, currency) + '</span>';
            html += '<span class="promo-price-new">' + fmtCost(discountedTotal, currency) + '</span>';
            html += '<span class="promo-saving">Экономия ' + fmtCost(saving, currency) + '</span>';
            html += '</div>';
            if (!promo.expired) {
                html += '<div class="promo-timer" id="promoTimer">';
                html += '<div class="promo-timer-block"><span class="promo-timer-num" id="promoDays">00</span><span class="promo-timer-label">дней</span></div>';
                html += '<div class="promo-timer-block"><span class="promo-timer-num" id="promoHours">00</span><span class="promo-timer-label">часов</span></div>';
                html += '<div class="promo-timer-block"><span class="promo-timer-num" id="promoMins">00</span><span class="promo-timer-label">минут</span></div>';
                html += '<div class="promo-timer-block"><span class="promo-timer-num" id="promoSecs">00</span><span class="promo-timer-label">секунд</span></div>';
                html += '</div>';
                html += '<button class="promo-cta" onclick="switchInnerTab(\'pay\')">Забронировать скидку <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>';
            } else {
                html += '<div class="promo-expired-msg">Срок действия предложения истёк</div>';
            }
            html += '</div></div>';
        }

        // === Inner Tabs ===
        var hasStages = stages.length > 0;
        var hasPayment = paymentPhases.length > 0;
        var hasPerspectives = perspectives.length > 0;
        var hasDocuments = proposals.length > 0 && !isKPMode;

        html += '<div class="inner-tabs fade-up" id="innerTabs">';

    function startPromoTimer() {
        if (promoTimerInterval) clearInterval(promoTimerInterval);
        var promo = DATA.promo || {};
        if (!promo.enabled || !promo.expires_at || promo.expired) return;
        var expiresAt = new Date(promo.expires_at).getTime();
        function tick() {
            var now = Date.now();
            var diff = expiresAt - now;
            if (diff <= 0) {
                clearInterval(promoTimerInterval);
                var banner = document.getElementById('promoBanner');
                if (banner) { banner.classList.add('expired'); }
                var d = document.getElementById('promoDays'); if (d) d.textContent = '00';
                var h = document.getElementById('promoHours'); if (h) h.textContent = '00';
                var m = document.getElementById('promoMins'); if (m) m.textContent = '00';
                var s = document.getElementById('promoSecs'); if (s) s.textContent = '00';
                return;
            }
            var days = Math.floor(diff / 86400000);
            var hours = Math.floor((diff % 86400000) / 3600000);
            var mins = Math.floor((diff % 3600000) / 60000);
            var secs = Math.floor((diff % 60000) / 1000);
            var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
            var d = document.getElementById('promoDays'); if (d) d.textContent = pad(days);
            var h = document.getElementById('promoHours'); if (h) h.textContent = pad(hours);
            var m = document.getElementById('promoMins'); if (m) m.textContent = pad(mins);
            var s = document.getElementById('promoSecs'); if (s) s.textContent = pad(secs);
        }
        tick();
        promoTimerInterval = setInterval(tick, 1000);
    }

    function initInnerTabs(chatTitle, isStaff, staff) {
        var tabsWrap = document.getElementById('innerTabs');
        if (!tabsWrap) return;

            var btn = e.target.closest('.inner-tab');
            if (!btn) return;
            var tab = btn.dataset.tab;
            switchInnerTab(tab, chatTitle, isStaff, staff);
        });
    }

    window.switchInnerTab = function(tab, chatTitle, isStaff, staff) {
        var tabsWrap = document.getElementById('innerTabs');
        if (tabsWrap) {
            tabsWrap.querySelectorAll('.inner-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === tab); });
        }
        document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
        var pane = document.getElementById('pane-' + tab);
        if (pane) pane.classList.add('active');

        if (tab === 'chat' && !chatInited) {
            chatInited = true;
            ChatWidget.init({
                container: '#cabinetChat',
                messagesUrl: '/api/cabinet/' + cabinetToken + '/messages',
                sendUrl: '/api/cabinet/' + cabinetToken + '/messages',
                headerTitle: chatTitle || 'Чат с командой',
                headerSub: (isStaff ? ('Вы: ' + ((staff && staff.name) || 'Менеджер')) : 'Мы ответим в ближайшее время'),
                pollInterval: 5000,
            });
        }
    };

    function statCard(iconCls, emoji, value, label) {
        return '<div class="stat-card"><div class="stat-icon ' + iconCls + '">' + emoji + '</div><div class="stat-value">' + value + '</div><div class="stat-label">' + label + '</div></div>';

    function renderCharts(modules) {
        var labels = [], hours = [], colors = [];
        modules.forEach(function(m, i) {
            labels.push(m.name || m.module || 'Модуль ' + (i + 1));
            var h = resolveRange(m.total) || Number(m.total_hours || m.hours || 0);
            hours.push(Math.round(h));
            colors.push(COLORS[i % COLORS.length]);
        });

        var canvasB = document.getElementById('chartBudget');
        if (canvasB) {
            budgetChart = new Chart(canvasB, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{ data: hours, backgroundColor: colors, borderWidth: 2, borderColor: '#fff', hoverOffset: 4 }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    cutout: '62%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1a1a2e',
                            titleFont: { family: 'Manrope', size: 13, weight: '600' },
                            bodyFont: { family: 'Manrope', size: 12 },
                            padding: 10,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(ctx) { return ctx.label + ': ' + ctx.raw + ' ч'; }
                            }
                        }
                    },
                },
            });

            var legendEl = document.getElementById('chartLegend');
            if (legendEl) {
                var totalH = hours.reduce(function(a, b) { return a + b; }, 0);
                var legendHtml = '';
                labels.forEach(function(lbl, i) {
                    var pct = totalH > 0 ? Math.round(hours[i] / totalH * 100) : 0;
                    legendHtml += '<div class="chart-legend-item">'
                        + '<span class="chart-legend-dot" style="background:' + colors[i] + '"></span>'
                        + '<span>' + esc(lbl) + '</span>'
                        + '<span class="chart-legend-hours">' + hours[i] + ' ч (' + pct + '%)</span>'
                        + '</div>';
                });
                legendEl.innerHTML = legendHtml;
            }
        }
    }

    function renderRoles(totals) {
        var rolesArea = document.getElementById('rolesArea');

        var ROLE_LABELS = { pm: 'PM', design: 'Дизайн', frontend: 'Frontend', backend: 'Backend', qa: 'QA' };

        var roles = ['pm', 'design', 'frontend', 'backend', 'qa'];
        var maxVal = 0;
        roles.forEach(function(r) {
            var v = resolveRange(totals[r]);
            if (v > maxVal) maxVal = v;
        });
        var h = '';
        roles.forEach(function(r) {
            var v = resolveRange(totals[r]);
            if (!v) return;
            var pct = maxVal > 0 ? (v / maxVal * 100) : 0;
            h += '<div class="role-row">';
            h += '<div class="role-label">' + ROLE_LABELS[r] + '</div>';
            h += '<div class="role-bar"><div class="role-bar-fill" style="width:' + pct + '%;background:' + ROLE_COLORS[r] + '"></div></div>';
            h += '<div class="role-hours">' + Math.round(v) + ' ч</div>';
            h += '</div>';
        });
        rolesArea.innerHTML = h;
    }

            messagesUrl: '/api/cabinet/' + cabinetToken + '/messages',
            sendUrl: '/api/cabinet/' + cabinetToken + '/messages',
            headerTitle: chatTitle,
            headerSub: isStaff ? ('Вы: ' + (staff.name||'Менеджер')) : 'Мы ответим в ближайшее время',
            pollInterval: 5000,
        });
        scrollToChatIfNeeded();
        startPromoTimer();
    }
})();
</script>
