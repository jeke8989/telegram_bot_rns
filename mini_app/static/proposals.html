<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/tokens.css?v=1772292397">
    <link rel="stylesheet" href="/css/base.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/sidebar.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/buttons.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/cards.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/inputs.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/modals.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/badges.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/tabs.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/table.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/empty-state.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/toast.css?v=1772292397">
    <link rel="stylesheet" href="/css/layouts/page-shell.css?v=1772292397">
    <link rel="stylesheet" href="/css/layouts/responsive.css?v=1772292397">
    <title>Предложения</title>
    <style>
        .proposals-table {
            width:100%; border-collapse:collapse; background:var(--surface);
            border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;
        }
        .proposals-table thead { background:var(--surface-2); }
        .proposals-table th {
            text-align:left; padding:12px 16px; font-size:.78rem; font-weight:600;
            color:var(--text-dim); text-transform:uppercase; letter-spacing:.04em;
            border-bottom:1px solid var(--border);
        }
        .proposals-table td {
            padding:14px 16px; font-size:.88rem; border-bottom:1px solid var(--border); vertical-align:middle;
        }
        .proposals-table tr:last-child td { border-bottom:none; }
        .proposals-table tbody tr { cursor:pointer; transition:background var(--transition); }
        .proposals-table tbody tr:hover { background:var(--surface-2); }
        .proposal-name { font-weight:600; color:var(--text); }
        .proposal-client { color:var(--text-dim); font-size:.84rem; }
        .type-badge {
            display:inline-block; border-radius:20px; padding:3px 10px;
            font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.03em;
        }
        .type-badge.mvp { background:rgba(0,206,201,.15); color:var(--green); border:1px solid rgba(0,206,201,.3); }
        .type-badge.full { background:rgba(108,92,231,.15); color:var(--accent); border:1px solid rgba(108,92,231,.3); }
        .status-badge.draft { background:rgba(139,143,168,.15); color:#8b8fa8; border:1px solid rgba(139,143,168,.3); }
        .status-badge.sent { background:rgba(108,92,231,.15); color:#6c5ce7; border:1px solid rgba(108,92,231,.3); }
        .status-badge.accepted { background:rgba(0,206,201,.15); color:#00cec9; border:1px solid rgba(0,206,201,.3); }
        .status-badge.rejected { background:rgba(225,115,85,.15); color:#e17355; border:1px solid rgba(225,115,85,.3); }
        .client-link { color:var(--text-dim); text-decoration:none; transition:color var(--transition); }
        .client-link:hover { color:var(--accent); text-decoration:underline; }
        .meta-pill {
            display:inline-flex; align-items:center; gap:4px;
            background:var(--surface-2); border:1px solid var(--border);
            border-radius:20px; padding:3px 10px; font-size:.76rem;
            color:var(--text-dim); white-space:nowrap;
        }
        .create-modal { max-width:560px; }
        .create-field { margin-bottom:14px; }
        .create-field label { display:block; font-size:.75rem; color:var(--text-dim); margin-bottom:5px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
        .create-field textarea { width:100%; min-height:110px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:.85rem; padding:10px 12px; outline:none; font-family:inherit; resize:vertical; transition:border-color var(--transition); box-sizing:border-box; }
        .create-field textarea:focus { border-color:var(--accent); }
        .create-field input, .create-field select { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:.85rem; padding:9px 12px; outline:none; font-family:inherit; transition:border-color var(--transition); box-sizing:border-box; }
        .create-field input:focus, .create-field select:focus { border-color:var(--accent); }
        .create-row { display:flex; gap:10px; }
        .create-row .create-field { flex:1; min-width:0; }
        .create-spinner { display:none; align-items:center; gap:10px; padding:20px; justify-content:center; color:var(--text-dim); font-size:.88rem; }
        .create-spinner.active { display:flex; }
        .create-spinner svg { animation: cspin 1s linear infinite; }
        @keyframes cspin { to { transform:rotate(360deg); } }

        @media (max-width:768px) {
            .proposals-table th:nth-child(3), .proposals-table td:nth-child(3),
            .proposals-table th:nth-child(4), .proposals-table td:nth-child(4),
            .proposals-table th:nth-child(5), .proposals-table td:nth-child(5) { display:none; }
            .proposals-table th, .proposals-table td { padding:10px; font-size:.82rem; }
            .create-row { flex-direction:column; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main-content">
        <div class="mobile-header">
            <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
            <span class="mobile-header-title">Предложения</span>
        </div>

        <div class="hero">
            <h1>Предложения</h1>
            <p class="hero-sub">Коммерческие предложения для клиентов</p>
        </div>

        <div class="container">
            <div class="section-header" style="justify-content:space-between">
                <div style="display:flex;align-items:center;gap:10px">
                    <span class="section-title">Все предложения</span>
                    <span class="section-count" id="proposalsCount">&mdash;</span>
                </div>
                <button class="btn-primary btn-compact" id="createProposalBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Создать
                </button>
            </div>
            <div id="proposalsContent">
                <div class="table-wrap"><table class="proposals-table"><thead><tr><th>Название</th><th>Клиент</th><th>Тип</th><th>Статус</th><th>Ставка</th><th>Дата</th><th style="width:120px">Действия</th></tr></thead><tbody>
                    <tr><td><div class="sk" style="height:14px;width:65%"></div></td><td><div class="sk" style="height:12px;width:50%"></div></td><td><div class="sk" style="height:22px;width:45px;border-radius:20px"></div></td><td><div class="sk" style="height:22px;width:65px;border-radius:20px"></div></td><td><div class="sk" style="height:22px;width:60px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:80px"></div></td><td><div style="display:flex;gap:4px"><div class="sk" style="height:28px;width:28px;border-radius:8px"></div><div class="sk" style="height:28px;width:28px;border-radius:8px"></div><div class="sk" style="height:28px;width:28px;border-radius:8px"></div></div></td></tr>
                    <tr><td><div class="sk" style="height:14px;width:55%"></div></td><td><div class="sk" style="height:12px;width:60%"></div></td><td><div class="sk" style="height:22px;width:45px;border-radius:20px"></div></td><td><div class="sk" style="height:22px;width:65px;border-radius:20px"></div></td><td><div class="sk" style="height:22px;width:60px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:80px"></div></td><td><div style="display:flex;gap:4px"><div class="sk" style="height:28px;width:28px;border-radius:8px"></div><div class="sk" style="height:28px;width:28px;border-radius:8px"></div><div class="sk" style="height:28px;width:28px;border-radius:8px"></div></div></td></tr>
                    <tr><td><div class="sk" style="height:14px;width:70%"></div></td><td><div class="sk" style="height:12px;width:45%"></div></td><td><div class="sk" style="height:22px;width:45px;border-radius:20px"></div></td><td><div class="sk" style="height:22px;width:65px;border-radius:20px"></div></td><td><div class="sk" style="height:22px;width:60px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:80px"></div></td><td><div style="display:flex;gap:4px"><div class="sk" style="height:28px;width:28px;border-radius:8px"></div><div class="sk" style="height:28px;width:28px;border-radius:8px"></div><div class="sk" style="height:28px;width:28px;border-radius:8px"></div></div></td></tr>
                    <tr><td><div class="sk" style="height:14px;width:50%"></div></td><td><div class="sk" style="height:12px;width:55%"></div></td><td><div class="sk" style="height:22px;width:45px;border-radius:20px"></div></td><td><div class="sk" style="height:22px;width:65px;border-radius:20px"></div></td><td><div class="sk" style="height:22px;width:60px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:80px"></div></td><td><div style="display:flex;gap:4px"><div class="sk" style="height:28px;width:28px;border-radius:8px"></div><div class="sk" style="height:28px;width:28px;border-radius:8px"></div><div class="sk" style="height:28px;width:28px;border-radius:8px"></div></div></td></tr>
                </tbody></table></div>
            </div>
        </div>
    </div>

    <!-- Create proposal modal -->
    <div class="modal-overlay" id="createOverlay">
        <div class="modal create-modal">
            <h3>Новое предложение</h3>
            <div id="createForm">
                <div class="create-field"><label>Описание проекта / ТЗ</label><textarea id="createDescription" placeholder="Опишите проект, его цели и функциональность..."></textarea></div>
                <div class="create-row">
                    <div class="create-field"><label>Тип</label><select id="createType"><option value="mvp">MVP</option><option value="full">Full</option></select></div>
                    <div class="create-field"><label>Дизайн</label><select id="createDesign"><option value="full_design">Полный дизайн</option><option value="wireframes">Только вайрфреймы</option><option value="no_design">Без дизайна</option></select></div>
                </div>
                <div class="create-row">
                    <div class="create-field"><label>Ставка / час</label><input type="number" id="createRate" step="0.01" placeholder="2000" value="2000"></div>
                    <div class="create-field"><label>Валюта</label><select id="createCurrency"><option value="₽">₽ RUB</option><option value="$">$ USD</option><option value="€">€ EUR</option></select></div>
                    <div class="create-field"><label>Бюджет (опц.)</label><input type="number" id="createBudget" placeholder="—"></div>
                </div>
                <div class="modal-actions"><button class="btn-secondary" id="createCancel">Отмена</button><button class="btn-primary" id="createSubmit">Сгенерировать</button></div>
            </div>
            <div class="create-spinner" id="createSpinner"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-6.22-8.56"/></svg>Генерация сметы...</div>
        </div>
    </div>

    <!-- Delete confirm modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>Удалить предложение?</h3>
            <p style="color:var(--text-dim);font-size:.9rem;line-height:1.6;margin-bottom:20px">
                Предложение будет удалено без возможности восстановления.<br>
                <strong style="color:var(--text)">Это действие нельзя отменить.</strong>
            </p>
            <div class="modal-actions">
                <button class="btn-secondary" id="cancelDeleteBtn">Отмена</button>
                <button class="btn-primary" id="confirmDeleteBtn" style="background:var(--red)">Удалить</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
    function escapeHtml(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(iso) {
        if (!iso) return '\u2014';
        const d = new Date(iso);
        return d.toLocaleDateString('ru-RU', { day:'numeric', month:'short', year:'numeric' });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function authFetch(url, opts) {
        const res = await fetch(url, opts);
        if (res.status === 401) { window.location.href = '/login'; throw new Error('unauthorized'); }
        return res;
    }

    let proposals = [];

    async function loadProposals() {
        try {
            const res = await authFetch('/api/proposals');
            if (!res.ok) throw new Error();
            proposals = await res.json();
            renderProposals();
        } catch {
            document.getElementById('proposalsContent').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">&#9888;&#65039;</div>
                    <h3>Не удалось загрузить предложения</h3>
                    <p>Попробуйте обновить страницу</p>
                </div>`;
        }
    }

    function renderProposals() {
        document.getElementById('proposalsCount').textContent = proposals.length;
        const el = document.getElementById('proposalsContent');

        if (!proposals.length) {
            el.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">&#128196;</div>
                    <h3>Предложений пока нет</h3>
                    <p>Создайте первое предложение через Telegram бота</p>
                </div>`;
            return;
        }

        const table = document.createElement('table');
        table.className = 'proposals-table';
        table.innerHTML = `
            <thead>
                <tr>
                    <th>Название</th>
                    <th>Клиент</th>
                    <th>Тип</th>
                    <th>Статус</th>
                    <th>Ставка</th>
                    <th>Дата</th>
                    <th style="width:120px">Действия</th>
                </tr>
            </thead>
            <tbody id="proposalsTbody"></tbody>`;

        const tbody = table.querySelector('#proposalsTbody');
        const STATUS_LABELS = {draft:'Черновик',sent:'Отправлено',accepted:'Принято',rejected:'Отклонено'};
        proposals.forEach(p => {
            const tr = document.createElement('tr');
            tr.onclick = () => { window.location.href = '/proposal/' + p.token + '/edit'; };

            const typeClass = (p.proposal_type || '').toLowerCase() === 'mvp' ? 'mvp' : 'full';
            const typeLabel = (p.proposal_type || '').toUpperCase() || '\u2014';
            const pStatus = p.proposal_status || 'draft';
            const clientDisplay = p.client_display_name || p.client_name || '\u2014';
            const clientHtml = p.client_uuid
                ? `<a class="client-link" href="/client/${p.client_uuid}" onclick="event.stopPropagation()">${escapeHtml(clientDisplay)}</a>`
                : `<span class="proposal-client">${escapeHtml(clientDisplay)}</span>`;

            tr.innerHTML = `
                <td><div class="proposal-name">${escapeHtml(p.project_name || 'Без названия')}</div></td>
                <td>${clientHtml}</td>
                <td><span class="type-badge ${typeClass}">${typeLabel}</span></td>
                <td><span class="status-badge ${pStatus}">${STATUS_LABELS[pStatus]||pStatus}</span></td>
                <td><span class="meta-pill">${p.hourly_rate || 0} ${escapeHtml(p.currency || '$')}/ч</span></td>
                <td style="color:var(--text-dim);font-size:.84rem;white-space:nowrap">${formatDate(p.created_at)}</td>
                <td>
                    <div class="actions-cell">
                        <button class="action-btn copy-btn" title="Копировать ссылку" data-token="${escapeHtml(p.token)}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                        </button>
                        <button class="action-btn open-btn" title="Открыть публичную ссылку" data-token="${escapeHtml(p.token)}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                        </button>
                        <button class="action-btn delete" title="Удалить" data-token="${escapeHtml(p.token)}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                        </button>
                    </div>
                </td>`;

            tr.querySelector('.copy-btn').addEventListener('click', e => {
                e.stopPropagation();
                const url = window.location.origin + '/proposal/' + p.token;
                navigator.clipboard.writeText(url).then(() => showToast('Ссылка скопирована'));
            });

            tr.querySelector('.open-btn').addEventListener('click', e => {
                e.stopPropagation();
                window.open('/proposal/' + p.token, '_blank');
            });

            tr.querySelector('.action-btn.delete').addEventListener('click', e => {
                e.stopPropagation();
                openDeleteModal(p.token, tr);
            });

            tbody.appendChild(tr);
        });

        const wrap = document.createElement('div');
        wrap.className = 'table-wrap';
        wrap.appendChild(table);
        el.innerHTML = '';
        el.appendChild(wrap);
    }

    // ── Delete modal ──
    let pendingDeleteToken = null;
    let pendingDeleteRow = null;
    const deleteModal = document.getElementById('deleteModal');

    function openDeleteModal(token, row) {
        pendingDeleteToken = token;
        pendingDeleteRow = row;
        deleteModal.classList.add('open');
    }

    document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
        deleteModal.classList.remove('open');
        pendingDeleteToken = null;
        pendingDeleteRow = null;
    });
    deleteModal.addEventListener('click', e => {
        if (e.target === deleteModal) { deleteModal.classList.remove('open'); pendingDeleteToken = null; pendingDeleteRow = null; }
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
        if (!pendingDeleteToken) return;
        const btn = document.getElementById('confirmDeleteBtn');
        btn.disabled = true;
        btn.textContent = 'Удаление...';
        try {
            const res = await fetch('/api/proposal/' + pendingDeleteToken, { method: 'DELETE' });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert('Ошибка: ' + (err.error || res.status));
            } else {
                if (pendingDeleteRow) pendingDeleteRow.remove();
                proposals = proposals.filter(p => p.token !== pendingDeleteToken);
                document.getElementById('proposalsCount').textContent = proposals.length;
                if (!proposals.length) renderProposals();
                deleteModal.classList.remove('open');
                showToast('Предложение удалено');
            }
        } catch {
            alert('Ошибка при удалении');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Удалить';
            pendingDeleteToken = null;
            pendingDeleteRow = null;
        }
    });


    // ── Create modal ──
    const createOverlay = document.getElementById('createOverlay');
    document.getElementById('createProposalBtn').addEventListener('click', () => {
        document.getElementById('createForm').style.display = '';
        document.getElementById('createSpinner').classList.remove('active');
        document.getElementById('createDescription').value = '';
        document.getElementById('createType').value = 'mvp';
        document.getElementById('createDesign').value = 'no_design';
        document.getElementById('createRate').value = '2000';
        document.getElementById('createCurrency').value = '₽';
        document.getElementById('createBudget').value = '';
        createOverlay.classList.add('open');
    });
    document.getElementById('createCancel').addEventListener('click', () => createOverlay.classList.remove('open'));
    createOverlay.addEventListener('click', e => { if (e.target === createOverlay) createOverlay.classList.remove('open'); });

    document.getElementById('createSubmit').addEventListener('click', async () => {
        const desc = document.getElementById('createDescription').value.trim();
        if (!desc) { showToast('Заполните описание проекта'); return; }
        const rate = parseFloat(document.getElementById('createRate').value);
        if (!rate || rate <= 0) { showToast('Укажите ставку'); return; }

        document.getElementById('createForm').style.display = 'none';
        document.getElementById('createSpinner').classList.add('active');

        try {
            const res = await authFetch('/api/proposals', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    description: desc,
                    proposal_type: document.getElementById('createType').value,
                    design_type: document.getElementById('createDesign').value,
                    hourly_rate: rate,
                    currency: document.getElementById('createCurrency').value,
                    budget: parseFloat(document.getElementById('createBudget').value) || null,
                }),
            });
            const data = await res.json();
            if (data.ok) {
                window.location.href = '/proposal/' + data.token + '/edit';
            } else {
                document.getElementById('createForm').style.display = '';
                document.getElementById('createSpinner').classList.remove('active');
                showToast('Ошибка: ' + (data.error || 'unknown'));
            }
        } catch(e) {
            document.getElementById('createForm').style.display = '';
            document.getElementById('createSpinner').classList.remove('active');
            showToast('Ошибка при создании');
        }
    });

    (async () => {
        loadProposals();
    })();
    </script>
    <script src="/sidebar.js"></script>
</body>
</html>
