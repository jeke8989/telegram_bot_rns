<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/tokens.css?v=1772292397">
    <link rel="stylesheet" href="/css/base.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/sidebar.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/buttons.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/cards.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/inputs.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/modals.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/badges.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/tabs.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/table.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/empty-state.css?v=1772292397">
    <link rel="stylesheet" href="/css/components/toast.css?v=1772292397">
    <link rel="stylesheet" href="/css/layouts/page-shell.css?v=1772292397">
    <link rel="stylesheet" href="/css/layouts/responsive.css?v=1772292397">
    <title>Клиенты</title>
    <style>
        .client-name { font-weight: 600; color: var(--text); }
        .client-company { color: var(--text-dim); font-size: .82rem; margin-top: 2px; }

        .clients-table { min-width: 780px; }
        .clients-table th:first-child,
        .clients-table td:first-child { min-width: 180px; white-space: normal; }
        .clients-table th, .clients-table td { white-space: nowrap; }

        .role-pill {
            display: inline-flex; align-items: center;
            font-size: .72rem; font-weight: 700;
            padding: 3px 10px; border-radius: 20px;
        }

        .status-badge {
            display: inline-flex; align-items: center;
            font-size: .72rem; font-weight: 700;
            padding: 3px 10px; border-radius: 20px;
        }
        .status-badge.lead { background: rgba(253,203,110,.14); color: #fdcb6e; border: 1px solid rgba(253,203,110,.35); }
        .status-badge.in_progress { background: rgba(108,92,231,.14); color: var(--accent); border: 1px solid rgba(108,92,231,.35); }
        .status-badge.client { background: rgba(0,206,201,.14); color: var(--green); border: 1px solid rgba(0,206,201,.35); }
        .status-badge.archived { background: rgba(139,143,168,.14); color: var(--text-dim); border: 1px solid rgba(139,143,168,.35); }

        .meta-pill {
            display: inline-flex; align-items: center;
            font-size: .74rem; font-weight: 600;
            padding: 3px 10px; border-radius: 20px;
            background: var(--surface-2); color: var(--text-dim);
            border: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .clients-table th:nth-child(3), .clients-table td:nth-child(3),
            .clients-table th:nth-child(4), .clients-table td:nth-child(4),
            .clients-table th:nth-child(5), .clients-table td:nth-child(5) { display: none; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main-content">
        <div class="mobile-header">
            <button class="mobile-menu-btn" id="mobileMenuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
            <span class="mobile-header-title">Клиенты</span>
        </div>

        <div class="hero">
            <h1>Клиенты</h1>
            <p class="hero-sub">CRM-воронка: от лида до проекта</p>
        </div>

        <div class="container">
            <div class="pipeline-tabs" id="pipelineTabs">
                <div class="pipeline-tab active" data-status="" data-role="">Все <span class="tab-count" id="countAll">—</span></div>
                <div class="pipeline-tab" data-status="lead" data-role="">Лиды <span class="tab-count" id="countLead">—</span></div>
                <div class="pipeline-tab" data-status="in_progress" data-role="">В работе <span class="tab-count" id="countInProgress">—</span></div>
                <div class="pipeline-tab" data-status="client" data-role="">Клиенты <span class="tab-count" id="countClient">—</span></div>
                <div class="pipeline-tab" data-status="archived" data-role="">Архив <span class="tab-count" id="countArchived">—</span></div>
                <div class="pipeline-tab" data-status="" data-role="staff">Сотрудники <span class="tab-count" id="countStaff">—</span></div>
            </div>

            <div class="section-header">
                <span class="section-title" id="sectionTitle">Все клиенты</span>
                <span class="section-count" id="clientsCount">—</span>
                <div class="header-actions">
                    <button class="btn-primary" id="addClientBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Новый клиент
                    </button>
                </div>
            </div>
            <div id="clientsContent">
                <div class="table-wrap"><table class="clients-table data-table"><thead><tr><th>Клиент</th><th>Статус</th><th>Контакт</th><th>КП</th><th>Дата</th><th style="width:80px"></th></tr></thead><tbody>
                    <tr><td><div class="sk" style="height:14px;width:60%"></div><div class="sk" style="height:10px;width:40%;margin-top:6px"></div></td><td><div class="sk" style="height:22px;width:60px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:70%"></div></td><td><div class="sk" style="height:22px;width:40px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:80px"></div></td><td></td></tr>
                    <tr><td><div class="sk" style="height:14px;width:50%"></div><div class="sk" style="height:10px;width:35%;margin-top:6px"></div></td><td><div class="sk" style="height:22px;width:65px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:55%"></div></td><td><div class="sk" style="height:22px;width:40px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:80px"></div></td><td></td></tr>
                    <tr><td><div class="sk" style="height:14px;width:70%"></div></td><td><div class="sk" style="height:22px;width:55px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:60%"></div></td><td><div class="sk" style="height:22px;width:40px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:80px"></div></td><td></td></tr>
                    <tr><td><div class="sk" style="height:14px;width:55%"></div><div class="sk" style="height:10px;width:30%;margin-top:6px"></div></td><td><div class="sk" style="height:22px;width:70px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:50%"></div></td><td><div class="sk" style="height:22px;width:40px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:80px"></div></td><td></td></tr>
                    <tr><td><div class="sk" style="height:14px;width:45%"></div></td><td><div class="sk" style="height:22px;width:60px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:65%"></div></td><td><div class="sk" style="height:22px;width:40px;border-radius:20px"></div></td><td><div class="sk" style="height:12px;width:80px"></div></td><td></td></tr>
                </tbody></table></div>
            </div>
        </div>
    </div>

    <!-- New client modal -->
    <div class="modal-overlay" id="newClientModal">
        <div class="modal">
            <h3>Новый клиент</h3>
            <div class="field-group">
                <label>Имя / контактное лицо *</label>
                <input class="field-input" id="ncName" placeholder="Иван Иванов">
            </div>
            <div class="field-row">
                <div class="field-group">
                    <label>Компания</label>
                    <input class="field-input" id="ncCompany" placeholder="ООО Компания">
                </div>
                <div class="field-group">
                    <label>Telegram</label>
                    <input class="field-input" id="ncTelegram" placeholder="@username">
                </div>
            </div>
            <div class="field-row">
                <div class="field-group">
                    <label>Email</label>
                    <input class="field-input" id="ncEmail" placeholder="email@example.com" type="email">
                </div>
                <div class="field-group">
                    <label>Телефон</label>
                    <input class="field-input" id="ncPhone" placeholder="+7 999 123 45 67">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="ncCancel">Отмена</button>
                <button class="btn-primary" id="ncCreate">Создать</button>
            </div>
        </div>
    </div>

    <!-- Invite link modal -->
    <div class="modal-overlay" id="inviteLinkModal">
        <div class="modal" style="max-width:520px">
            <div style="text-align:center;margin-bottom:20px">
                <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b7ff0);display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h3 style="margin-bottom:6px">Клиент создан!</h3>
                <p style="color:var(--text-dim);font-size:.88rem;line-height:1.5">
                    Отправьте эту ссылку клиенту <b id="inviteClientName"></b>.<br>
                    При переходе он зарегистрируется в боте и получит доступ к личному кабинету.
                </p>
            </div>
            <div style="position:relative">
                <input class="field-input" id="inviteLinkInput" readonly style="padding-right:120px;font-size:.82rem;background:var(--bg);border:1px solid var(--border);font-family:monospace">
            </div>
            <div class="modal-actions" style="margin-top:18px;justify-content:center">
                <button class="btn-primary" id="copyInviteLink" style="gap:8px">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                    Копировать ссылку
                </button>
                <button class="btn-secondary" id="inviteLinkClose">Готово</button>
            </div>
        </div>
    </div>

    <!-- Delete client modal -->
    <div class="modal-overlay" id="deleteClientModal">
        <div class="modal" style="max-width:420px">
            <div id="deleteModalIcon" style="font-size:2.2rem;text-align:center;margin-bottom:12px"></div>
            <h3 id="deleteModalTitle" style="text-align:center;margin-bottom:10px"></h3>
            <p id="deleteModalDesc" style="font-size:.88rem;color:var(--text-dim);text-align:center;line-height:1.6;margin-bottom:4px"></p>
            <p id="deleteModalWarning" style="display:none;margin-top:12px;padding:12px 14px;background:rgba(225,115,85,.08);border:1px solid rgba(225,115,85,.25);border-radius:10px;font-size:.83rem;color:var(--red);line-height:1.6"></p>
            <div class="modal-actions" style="margin-top:20px">
                <button class="btn-secondary" id="deleteCancel">Отмена</button>
                <button class="btn-danger" id="deleteConfirm">Удалить карточку</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    const STATUS_LABELS = { lead: 'Лид', in_progress: 'В работе', client: 'Клиент', archived: 'Архив' };
    const ROLE_COLORS = { admin: '#6c5ce7', staff: '#00cec9', seller: '#fd79a8', user: '#8b8fa8' };
    const ROLE_LABELS = { admin: 'Админ', staff: 'Сотрудник', seller: 'Продажи', user: 'Пользователь' };
    let allClients = [];
    let activeStatus = '';
    let activeRole = '';
    let pendingDeleteId = null;

    function escapeHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function formatDate(iso) { if (!iso) return '\u2014'; return new Date(iso).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'}); }
    function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

    async function authFetch(url, opts) {
        const res = await fetch(url, opts);
        if (res.status === 401) { window.location.href = '/login'; throw new Error('unauthorized'); }
        return res;
    }

    async function loadClients() {
        try {
            const res = await authFetch('/api/clients');
            if (!res.ok) throw new Error('status ' + res.status);
            allClients = await res.json();
            updateCounts();
            renderClients();
        } catch (e) {
            console.error('loadClients error:', e);
            document.getElementById('clientsContent').innerHTML = `
                <div class="empty-state">
                    <h3>Не удалось загрузить клиентов</h3>
                    <p style="margin-bottom:16px">Проверьте подключение и попробуйте снова</p>
                    <button class="btn-secondary" onclick="document.getElementById('clientsContent').innerHTML='<div class=\\'loading-state\\'><div class=\\'spinner\\'></div><p>Загрузка...</p></div>';loadClients()">Повторить</button>
                </div>`;
        }
    }

    function updateCounts() {
        document.getElementById('countAll').textContent = allClients.length;
        document.getElementById('countLead').textContent = allClients.filter(c=>c.status==='lead').length;
        document.getElementById('countInProgress').textContent = allClients.filter(c=>c.status==='in_progress').length;
        document.getElementById('countClient').textContent = allClients.filter(c=>c.status==='client').length;
        document.getElementById('countArchived').textContent = allClients.filter(c=>c.status==='archived').length;
        document.getElementById('countStaff').textContent = allClients.filter(c=>['staff','admin','seller'].includes(c.role)).length;
    }

    function renderClients() {
        let filtered = allClients;
        if (activeStatus) filtered = filtered.filter(c => c.status === activeStatus);
        if (activeRole) filtered = filtered.filter(c => ['staff','admin','seller'].includes(c.role));
        document.getElementById('clientsCount').textContent = filtered.length;
        const el = document.getElementById('clientsContent');

        if (!filtered.length) {
            el.innerHTML = '<div class="empty-state"><h3>Клиентов пока нет</h3><p>Добавьте первого клиента</p></div>';
            return;
        }

        const table = document.createElement('table');
        table.className = 'clients-table data-table';
        table.innerHTML = `<thead><tr><th>Клиент</th><th>Статус</th><th>Контакт</th><th>КП</th><th>Дата</th><th style="width:80px"></th></tr></thead><tbody id="clientsTbody"></tbody>`;
        const tbody = table.querySelector('#clientsTbody');

        filtered.forEach(c => {
            const tr = document.createElement('tr');
            const contact = c.telegram || c.email || c.phone || '\u2014';
            const navAttr = c.uuid ? `data-nav="/client/${c.uuid}"` : '';
            const cursorStyle = c.uuid ? 'cursor:pointer' : '';
            const statusCell = c.status
                ? `<span class="status-badge ${c.status}">${STATUS_LABELS[c.status]||c.status}</span>`
                : `<span style="color:var(--text-dim);font-size:.82rem">—</span>`;
            tr.innerHTML = `
                <td style="${cursorStyle}" ${navAttr}>
                    <div class="client-name">${escapeHtml(c.name)}</div>
                    ${c.company ? '<div class="client-company">'+escapeHtml(c.company)+'</div>' : ''}
                </td>
                <td style="${cursorStyle}" ${navAttr}>${statusCell}</td>
                <td style="color:var(--text-dim);font-size:.84rem;${cursorStyle}" ${navAttr}>${escapeHtml(contact)}</td>
                <td style="${cursorStyle}" ${navAttr}><span class="meta-pill">${c.proposals_count||0} КП</span></td>
                <td style="color:var(--text-dim);font-size:.84rem;white-space:nowrap;${cursorStyle}" ${navAttr}>${formatDate(c.created_at)}</td>
                <td class="actions-cell">
                    ${c.invite_link ? `<button class="action-btn copy-invite" data-link="${escapeHtml(c.invite_link)}" title="${c.is_registered ? 'Клиент зарегистрирован — скопировать ссылку' : 'Копировать ссылку регистрации'}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="${c.is_registered ? 'var(--green)' : 'currentColor'}" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
                    </button>` : ''}
                    <button class="action-btn delete" data-id="${c.uuid || ''}" title="Удалить карточку" ${!c.uuid ? 'disabled style="opacity:.4"' : ''}>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
                    </button>
                </td>`;
            tr.querySelectorAll('[data-nav]').forEach(td => {
                td.addEventListener('click', () => { window.location.href = td.dataset.nav; });
            });
            const copyBtn = tr.querySelector('.action-btn.copy-invite');
            if (copyBtn) {
                copyBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(copyBtn.dataset.link).then(() => {
                        showToast('Ссылка скопирована');
                    });
                });
            }
            tr.querySelector('.action-btn.delete').addEventListener('click', e => {
                e.stopPropagation();
                openDeleteModal(c);
            });
            tbody.appendChild(tr);
        });

        const wrap = document.createElement('div');
        wrap.className = 'table-wrap';
        wrap.appendChild(table);
        el.innerHTML = '';
        el.appendChild(wrap);
    }

    // Pipeline tabs
    document.getElementById('pipelineTabs').addEventListener('click', e => {
        const tab = e.target.closest('.pipeline-tab');
        if (!tab) return;
        document.querySelectorAll('.pipeline-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeStatus = tab.dataset.status || '';
        activeRole = tab.dataset.role || '';
        renderClients();
    });

    // New client modal
    const modal = document.getElementById('newClientModal');
    document.getElementById('addClientBtn').addEventListener('click', () => modal.classList.add('open'));
    document.getElementById('ncCancel').addEventListener('click', () => modal.classList.remove('open'));
    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

    document.getElementById('ncCreate').addEventListener('click', async () => {
        const name = document.getElementById('ncName').value.trim();
        if (!name) { document.getElementById('ncName').focus(); return; }
        const btn = document.getElementById('ncCreate');
        btn.disabled = true; btn.textContent = 'Создание...';
        try {
            const res = await authFetch('/api/clients', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    name,
                    company: document.getElementById('ncCompany').value.trim(),
                    telegram: document.getElementById('ncTelegram').value.trim(),
                    email: document.getElementById('ncEmail').value.trim(),
                    phone: document.getElementById('ncPhone').value.trim(),
                }),
            });
            if (!res.ok) { const e = await res.json().catch(()=>({})); alert('Ошибка: '+(e.error||res.status)); return; }
            const client = await res.json();
            modal.classList.remove('open');
            ['ncName','ncCompany','ncTelegram','ncEmail','ncPhone'].forEach(id => document.getElementById(id).value = '');

            if (client.invite_link) {
                openInviteLinkModal(client.invite_link, client.name);
            } else {
                showToast('Клиент создан');
                window.location.href = '/client/' + client.uuid;
            }
        } catch { alert('Ошибка при создании'); }
        finally { btn.disabled = false; btn.textContent = 'Создать'; }
    });

    function openInviteLinkModal(link, clientName) {
        document.getElementById('inviteLinkInput').value = link;
        document.getElementById('inviteClientName').textContent = clientName || '';
        document.getElementById('inviteLinkModal').classList.add('open');
    }

    document.getElementById('copyInviteLink').addEventListener('click', () => {
        const input = document.getElementById('inviteLinkInput');
        navigator.clipboard.writeText(input.value).then(() => {
            const btn = document.getElementById('copyInviteLink');
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Скопировано';
            setTimeout(() => {
                btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Копировать ссылку';
            }, 2000);
        });
    });

    document.getElementById('inviteLinkClose').addEventListener('click', () => {
        document.getElementById('inviteLinkModal').classList.remove('open');
        loadClients();
    });
    document.getElementById('inviteLinkModal').addEventListener('click', e => {
        if (e.target === document.getElementById('inviteLinkModal')) {
            document.getElementById('inviteLinkModal').classList.remove('open');
            loadClients();
        }
    });


    // Delete modal logic
    function openDeleteModal(c) {
        pendingDeleteId = c.uuid;
        const iconEl = document.getElementById('deleteModalIcon');
        const titleEl = document.getElementById('deleteModalTitle');
        const descEl = document.getElementById('deleteModalDesc');
        const warnEl = document.getElementById('deleteModalWarning');

        iconEl.textContent = c.is_staff ? '⚠️' : '🗑️';
        titleEl.textContent = `Удалить карточку клиента?`;
        descEl.textContent = `«${c.name}» будет удалён из CRM вместе со всеми связями с КП и проектами.`;

        if (c.is_staff) {
            warnEl.style.display = '';
            warnEl.textContent = '⚠️ Этот клиент также является сотрудником/администратором. Будет удалена только карточка клиента. Его профиль в Telegram-боте и доступ к порталу сохранятся.';
        } else {
            warnEl.style.display = 'none';
        }

        document.getElementById('deleteClientModal').classList.add('open');
    }

    document.getElementById('deleteCancel').addEventListener('click', () => {
        document.getElementById('deleteClientModal').classList.remove('open');
        pendingDeleteId = null;
    });
    document.getElementById('deleteClientModal').addEventListener('click', e => {
        if (e.target === document.getElementById('deleteClientModal')) {
            document.getElementById('deleteClientModal').classList.remove('open');
            pendingDeleteId = null;
        }
    });

    document.getElementById('deleteConfirm').addEventListener('click', async () => {
        if (!pendingDeleteId) return;
        const btn = document.getElementById('deleteConfirm');
        btn.disabled = true; btn.textContent = 'Удаление...';
        try {
            const res = await authFetch('/api/client/' + pendingDeleteId, { method: 'DELETE' });
            if (res.ok) {
                allClients = allClients.filter(c => c.uuid !== pendingDeleteId);
                updateCounts();
                renderClients();
                showToast('Карточка клиента удалена');
                document.getElementById('deleteClientModal').classList.remove('open');
            } else {
                const err = await res.json().catch(() => ({}));
                alert('Ошибка: ' + (err.error || res.status));
            }
        } catch { alert('Ошибка при удалении'); }
        finally {
            btn.disabled = false; btn.textContent = 'Удалить карточку';
            pendingDeleteId = null;
        }
    });

    (async () => {
        loadClients();
    })();
    </script>
    <script src="/sidebar.js"></script>
</body>
</html>
